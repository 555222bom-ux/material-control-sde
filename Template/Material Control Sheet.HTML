            const [alertMsg, setAlertMsg] = useState(null);
            const [confirmMsg, setConfirmMsg] = useState(null);

            const showAlert = (message, title = "แจ้งเตือน") => setAlertMsg({ title, message });
            const showConfirm = (message, onConfirm, title = "ยืนยันการทำรายการ") => setConfirmMsg({ title, message, onConfirm });

            // Recovery Modal State
            const [showRecoveryModal, setShowRecoveryModal] = useState(false);
            const [recoveryOptions, setRecoveryOptions] = useState([]);

            useEffect(() => {
                loadXLSX();
                
                // 🚀 SUPER AUTO-RECOVERY: Scan all localStorage to find the largest valid database
                let parsed = null;
                let maxLength = -1;
                let bestKey = '';

                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    try {
                        const raw = localStorage.getItem(key);
                        if (raw && raw.includes('masterData')) {
                            const p = JSON.parse(raw);
                            if (p && p.masterData && Array.isArray(p.masterData)) {
                                if (raw.length > maxLength) {
                                    maxLength = raw.length;
                                    parsed = p;
                                    bestKey = key;
                                }
                            }
                        }
                    } catch (e) { }
                }

                if (parsed) {
                    console.log("🔥 Recovered Data from Key:", bestKey, "Size:", maxLength);
                    let loadedMasterData = parsed.masterData || [];
                    let loadedCats = parsed.categoryList || [];
                    loadedCats = loadedCats.map(c => c.abbr ? c : { ...c, abbr: c.name.substring(0, 2).toUpperCase() });
                    if(loadedCats.length === 0) loadedCats = [{id: 'CAT-1', name: 'General', abbr: 'GN'}];
                    
                    let loadedUnits = parsed.unitList || [];
                    let loadedPersonnel = parsed.personnel || [];
                    let loadedRequests = parsed.requests || [];
                    let loadedReceipts = parsed.receipts || [];
                    let loadedPlans = parsed.plans || [];
                    let loadedVendors = parsed.vendors || [];
                    let loadedCompanies = parsed.companies && parsed.companies.length ? parsed.companies : [{ id: Date.now(), name: 'บริษัทหลัก (Main Contractor)' }];

                    if(parsed.reqConfig) setReqConfig(parsed.reqConfig);

                    // --- DATA MIGRATION: Convert inline tracking data to History records ---
                    loadedMasterData.forEach(m => {
                        // Plans Migration
                        if (m.ordered && Array.isArray(m.ordered)) {
                            m.ordered.forEach(o => {
                                if (o.qty && Number(o.qty) > 0 && (!o.planId || !loadedPlans.find(p => p.id === o.planId))) {
                                    let plan = loadedPlans.find(p => p.prNo === (o.prNo || 'N/A') && p.date === (o.date || ''));
                                    if (!plan) {
                                        plan = { id: `PLAN-MIG-${Date.now()}-${Math.random().toString(36).substr(2,5)}`, prNo: o.prNo || 'N/A', date: o.date || '', items: [] };
                                        loadedPlans.push(plan);
                                    }
                                    if (!plan.items.find(i => i.code === m.code)) {
                                        plan.items.push({ code: m.code, name: m.name, spec: m.spec, brand: m.brand, unit: m.unit, qty: o.qty });
                                    }
                                    o.planId = plan.id;
                                }
                            });
                        }
                        
                        // Receipts Migration
                        if (m.received && Array.isArray(m.received)) {
                            m.received.forEach(r => {
                                if (r.qty && Number(r.qty) > 0 && (!r.receiptId || !loadedReceipts.find(p => p.id === r.receiptId))) {
                                    let rec = loadedReceipts.find(p => p.do === (r.deliveryNo || '') && p.date === (r.date || ''));
                                    if (!rec) {
                                        rec = { id: `REC-MIG-${Date.now()}-${Math.random().toString(36).substr(2,5)}`, vendor: r.vendor || 'Unknown', do: r.deliveryNo || '', pr: r.prNo || '', date: r.date || '', items: [] };
                                        loadedReceipts.push(rec);
                                    }
                                    if (!rec.items.find(i => i.code === m.code)) {
                                        rec.items.push({ code: m.code, name: m.name, spec: m.spec, brand: m.brand, unit: m.unit, qty: r.qty });
                                    }
                                    r.receiptId = rec.id;
                                }
                            });
                        }
                        
                        // Requests/Disbursed Migration
                        if (m.disbursed && Array.isArray(m.disbursed)) {
                            m.disbursed.forEach(d => {
                                if (d.qty && Number(d.qty) > 0 && (!d.reqNo || !loadedRequests.find(req => req.id === d.reqNo || req.sheetNo === d.reqNo))) {
                                    let reqName = d.reqNo || `REQ-MIG-${d.date || 'Old'}`;
                                    let req = loadedRequests.find(p => p.id === reqName);
                                    if (!req) {
                                        req = { id: reqName, sheetNo: reqName, from: d.company || 'Unknown', company: d.company || '', date: d.date || '', work: '', status: 'Approved', items: [] };
                                        loadedRequests.push(req);
                                    }
                                    if (!req.items.find(i => i.code === m.code)) {
                                        req.items.push({ code: m.code, name: m.name, spec: m.spec, brand: m.brand, unit: m.unit, qty: d.qty });
                                    }
                                    d.reqNo = req.id;
                                }
                            });
                        }
                    });

                    setMasterData(loadedMasterData);
                    setCategoryList(loadedCats);
                    setUnitList(loadedUnits);
                    setPersonnel(loadedPersonnel);
                    setRequests(loadedRequests);
                    setReceipts(loadedReceipts);
                    setPlans(loadedPlans);
                    setVendors(loadedVendors);
                    setCompanies(loadedCompanies);
                } else {
                    setCompanies([{ id: Date.now(), name: 'บริษัทหลัก (Main Contractor)' }]);
                }

                // Prevent state overwrite race condition
                setTimeout(() => {
                    setIsLoaded(true);
                }, 500);
            }, []);

            useEffect(() => {
                if (isLoaded) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ masterData, categoryList, unitList, personnel, requests, receipts, plans, reqConfig, vendors, companies }));
                }
            }, [masterData, categoryList, unitList, personnel, requests, receipts, plans, reqConfig, vendors, companies, isLoaded]);

            // --- SUPER BACKUP & RESTORE SYSTEMS ---
            const handleExportBackup = () => {
                const dataStr = JSON.stringify({ masterData, categoryList, unitList, personnel, requests, receipts, plans, reqConfig, vendors, companies });
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `MaterialControl_Backup_${new Date().toISOString().split('T')[0]}.json`;
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const handleImportBackup = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const parsed = JSON.parse(evt.target.result);
                        if (parsed && parsed.masterData) {
                            localStorage.setItem(STORAGE_KEY, evt.target.result);
                            showAlert("กู้คืนข้อมูลจากไฟล์ Backup สำเร็จ! ระบบจะทำการรีโหลดหน้าจอใหม่", "กู้คืนสำเร็จ");
                            setTimeout(() => { window.location.reload(); }, 1500);
                        } else {
                            showAlert("ไฟล์ข้อมูลไม่ถูกต้อง (รูปแบบไม่ตรงกับระบบ)", "เกิดข้อผิดพลาด");
                        }
                    } catch(err) {
                        showAlert("เกิดข้อผิดพลาดในการอ่านไฟล์ JSON", "เกิดข้อผิดพลาด");
                    }
                };
                reader.readAsText(file);
            };

            const triggerManualRestore = () => {
                let backups = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    try {
                        const raw = localStorage.getItem(key);
                        if (raw && raw.includes('masterData')) {
                            const p = JSON.parse(raw);
                            if (p && p.masterData && p.masterData.length > 0) {
                                backups.push({ key, size: raw.length, items: p.masterData.length, raw });
                            }
                        }
                    } catch(e) {}
                }
                setRecoveryOptions(backups.sort((a,b) => b.size - a.size));
                setShowRecoveryModal(true);
            };

            const resetData = () => { 
                showConfirm("ยืนยันที่จะลบข้อมูลทั้งหมดและเริ่มใหม่ใช่หรือไม่? ข้อมูลจะไม่สามารถกู้คืนได้เว้นแต่คุณจะมีไฟล์ Backup", () => {
                    localStorage.removeItem(STORAGE_KEY); 
                    window.location.reload(); 
                }); 
            };

            const handleExportSummary = () => {
                const activeItems = sortMasterData(masterData.filter(m => isItemActive(m) && (summaryCat === 'ALL' || m.category === summaryCat)));
                const exportData = activeItems.map(m => {
                    const r = sumArrayQty(m.received);
                    const d = sumArrayQty(m.disbursed);

                    return {
                        "Item Code": m.code,
                        "Item Name": m.name,
                        "Brand": m.brand || '-',
                        "Spec": m.spec,
                        "Unit": m.unit,
                        "Category": m.category,
                        "Total Received (In)": r,
                        "Total Disbursed (Out)": d,
                        "Balance (คงเหลือ)": r - d
                    };
                });
                exportToExcel(exportData, "StockSummary_Export", "Summary");
            };

            const handleExportRequestHistory = () => {
                let exportData = [];
                requests.forEach(req => {
                    req.items.forEach(it => {
                        exportData.push({
                            "Request No.": req.sheetNo,
                            "Date": formatDate(req.date),
                            "Status": req.status,
                            "Company": req.company || '-',
                            "Requestor": req.from,
                            "Checker": req.checker || '-',
                            "Approver": req.approver || '-',
                            "Dispenser": req.dispenser || '-',
                            "Work/Location": req.work || '-',
                            "Material Code": it.code,
                            "Material Name": it.name,
                            "Spec": it.spec,
                            "Unit": it.unit,
                            "Quantity": it.qty
                        });
                    });
                });
                exportToExcel(exportData, "RequestHistory_Export", "Requests");
            };

            const deleteRequestRecord = (req) => {
                showConfirm(`ต้องการลบใบเบิก ${req.sheetNo} ใช่หรือไม่?\n**ยอดที่เบิกไปจะถูกคืนกลับเข้าสต็อก**`, () => {
                    let newMaster = [...masterData];
                    req.items.forEach(oldItem => {
                        const mIdx = newMaster.findIndex(m => m.code === oldItem.code);
                        if (mIdx > -1 && newMaster[mIdx].disbursed) {
                            const dIdx = newMaster[mIdx].disbursed.findIndex(d => d.reqNo === req.id);
                            if (dIdx > -1) newMaster[mIdx].disbursed.splice(dIdx, 1);
                        }
                    });
                    setMasterData(newMaster);
                    setRequests(prev => prev.filter(r => r.id !== req.id));
                    showAlert("ลบข้อมูลประวัติการเบิกสำเร็จ", "สำเร็จ");
                });
            };

            if (!isLoaded) {
                return (
                    <div className="flex min-h-screen items-center justify-center bg-slate-50 flex-col">
                        <div className="text-4xl mb-4 animate-bounce">📦</div>
                        <h2 className="text-xl font-bold text-slate-700">กำลังกู้คืนและโหลดข้อมูล...</h2>
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen bg-slate-100 font-sans text-slate-900">
                    {/* UI DIALOGS */}
                    {alertMsg && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all">
                                <div className="p-4 bg-blue-600 text-white font-bold flex gap-2 items-center"><Icons.FileText size={18}/> {alertMsg.title}</div>
                                <div className="p-6 text-slate-700 font-medium text-center">{alertMsg.message}</div>
                                <div className="p-4 border-t bg-slate-50 flex justify-end">
                                    <button onClick={() => { if(alertMsg.onOk) alertMsg.onOk(); setAlertMsg(null); }} className="px-8 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-md transition-transform active:scale-95">ตกลง</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {confirmMsg && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all">
                                <div className="p-4 bg-red-600 text-white font-bold flex gap-2 items-center"><Icons.Target size={18}/> {confirmMsg.title}</div>
                                <div className="p-6 text-slate-700 font-medium whitespace-pre-line text-center leading-relaxed">{confirmMsg.message}</div>
                                <div className="p-4 border-t bg-slate-50 flex justify-end gap-3">
                                    <button onClick={() => setConfirmMsg(null)} className="px-6 py-2 text-slate-600 hover:bg-slate-200 rounded-lg font-bold transition-colors">ยกเลิก</button>
                                    <button onClick={() => { confirmMsg.onConfirm(); setConfirmMsg(null); }} className="px-6 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 shadow-md transition-transform active:scale-95">ยืนยัน</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RECOVERY MODAL */}
                    {showRecoveryModal && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
                                <div className="p-4 bg-emerald-600 text-white font-bold flex justify-between items-center">
                                    <div className="flex gap-2 items-center"><Icons.RefreshCw size={18}/> ค้นหาและกู้คืนข้อมูลเดิม</div>
                                    <button onClick={()=>setShowRecoveryModal(false)} className="hover:bg-white/20 p-1 rounded-lg"><Icons.X size={18}/></button>
                                </div>
                                <div className="p-6 max-h-96 overflow-y-auto bg-slate-50">
                                    {recoveryOptions.length === 0 ? (
                                        <div className="text-center text-slate-500 py-8 border-2 border-dashed border-slate-300 rounded-xl bg-white">
                                            <Icons.Search size={32} className="mx-auto mb-2 text-slate-300"/>
                                            <p className="font-bold">ไม่พบประวัติข้อมูลเก่าในเบราว์เซอร์นี้</p>
                                            <p className="text-xs mt-2">หากมีการเปลี่ยน Browser ล้างแคช หรือใช้โหมดไม่ระบุตัวตน ข้อมูลอาจถูกลบไปแล้ว แนะนำให้ใช้การ "โหลดไฟล์ Backup (.json)" แทนครับ</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            <p className="text-sm text-slate-600 font-bold mb-4">✅ พบข้อมูลที่อาจเป็นของคุณ! กรุณาเลือกเวอร์ชันที่ต้องการกู้คืน:</p>
                                            {recoveryOptions.map((opt, idx) => (
                                                <div key={idx} className="border-2 border-emerald-200 bg-white p-4 rounded-xl flex justify-between items-center hover:border-emerald-400 transition-colors shadow-sm">
                                                    <div>
                                                        <div className="font-black text-emerald-800 text-lg">มีพัสดุ {opt.items} รายการ</div>
                                                        <div className="text-xs text-slate-500 font-mono mt-1">ขนาดไฟล์: {(opt.size/1024).toFixed(2)} KB</div>
                                                    </div>
                                                    <button onClick={()=>{
                                                        localStorage.setItem(STORAGE_KEY, opt.raw);
                                                        window.location.reload();
                                                    }} className="bg-emerald-600 text-white px-5 py-2.5 rounded-lg font-bold shadow hover:bg-emerald-700 active:scale-95 transition-transform flex gap-2 items-center"><Icons.Upload size={16}/> กู้คืน</button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Sidebar */}
                    <aside className={`fixed inset-y-0 left-0 z-30 w-64 bg-slate-900 text-white transition-transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 lg:static flex flex-col shadow-xl`}>
                        <div className="h-16 flex items-center px-6 border-b border-slate-800"><h1 className="text-xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">Material Control SDE</h1></div>
                        <nav className="flex-1 p-4 space-y-1 overflow-y-auto custom-scrollbar">
                            <button onClick={() => setActiveView('SUMMARY')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'SUMMARY' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.LayoutDashboard size={18} /> Dashboard Summary</button>
                            <button onClick={() => setActiveView('TRACKING')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'TRACKING' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.Target size={18} /> Tracking Board</button>
                            <button onClick={() => setActiveView('STOCK_CARD')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'STOCK_CARD' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.Book size={18} /> Stock Card</button>
                            <button onClick={() => setActiveView('PLAN_MANAGE')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'PLAN_MANAGE' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.ClipboardList size={18} /> Manage Plans</button>
                            <button onClick={() => setActiveView('RECEIVING')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'RECEIVING' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.Truck size={18} /> Receiving History</button>
                            <button onClick={() => setActiveView('REQUEST')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'REQUEST' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.FileText size={18} /> Request History</button>
                            <div className="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">System Setup</div>
                            <button onClick={() => setActiveView('REQ_SETUP')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'REQ_SETUP' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.Settings size={18} /> Req. Setup</button>
                            <button onClick={() => setActiveView('MASTER')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'MASTER' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.Database size={18} /> Master Data</button>
                            <button onClick={() => setActiveView('CATEGORY')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'CATEGORY' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.Tag size={18} /> Category</button>
                            <button onClick={() => setActiveView('UNIT')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'UNIT' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.Ruler size={18} /> Unit</button>
                            <button onClick={() => setActiveView('COMPANY')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'COMPANY' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.Building size={18} /> Company Setup</button>
                            <button onClick={() => setActiveView('PERSONNEL')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'PERSONNEL' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.Users size={18} /> Personnel</button>
                            <button onClick={() => setActiveView('VENDOR')} className={`w-full flex gap-3 px-4 py-3 rounded-lg text-sm ${activeView === 'VENDOR' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><Icons.Store size={18} /> Vendor</button>
                        </nav>
                        
                        {/* Data Backup & Restore Panel */}
                        <div className="p-4 border-t border-slate-800 text-xs flex flex-col gap-2 bg-slate-950">
                            <div className="text-slate-400 font-bold mb-1 uppercase tracking-wider text-center">Data Recovery Tool</div>
                            <button onClick={triggerManualRestore} className="text-emerald-400 hover:bg-emerald-900/30 font-bold border border-emerald-800 rounded py-2 transition-colors flex items-center justify-center gap-2 w-full"><Icons.Search size={14}/> ค้นหาข้อมูลเดิม (Scan)</button>
                            <label className="text-blue-400 hover:bg-blue-900/30 font-bold border border-blue-800 rounded py-2 transition-colors flex items-center justify-center gap-2 w-full cursor-pointer"><Icons.Upload size={14}/> โหลดไฟล์ Backup <input type="file" hidden accept=".json" onChange={handleImportBackup} /></label>
                            <button onClick={handleExportBackup} className="text-slate-300 hover:bg-slate-800 font-bold border border-slate-700 rounded py-2 transition-colors flex items-center justify-center gap-2 w-full"><Icons.Download size={14}/> บันทึกเป็นไฟล์ Backup</button>
                            <button onClick={resetData} className="text-red-400 hover:text-red-300 transition-colors mt-2 text-center w-full underline">Reset All Data</button>
                        </div>
                    </aside>
                    
                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm z-20 shrink-0">
                            <div className="flex items-center gap-4"><button className="lg:hidden text-slate-600" onClick={() => setSidebarOpen(!sidebarOpen)}><Icons.Menu /></button><h2 className="text-lg font-bold text-slate-800">Project: Material Management</h2></div>
                            <div className="flex gap-2">
                                <button onClick={() => { setEditingPlan(null); setIsPlanning(true); }} className="bg-blue-600 text-white px-3 py-1.5 md:px-4 md:py-2 rounded-lg text-xs font-bold shadow hover:bg-blue-700 flex gap-1 md:gap-2 items-center transition-colors"><Icons.ClipboardList size={16} /> <span className="hidden md:inline">Plan</span></button>
                                <button onClick={() => { setEditingReceipt(null); setIsReceiving(true); }} className="bg-green-600 text-white px-3 py-1.5 md:px-4 md:py-2 rounded-lg text-xs font-bold shadow hover:bg-green-700 flex gap-1 md:gap-2 items-center transition-colors"><Icons.Truck size={16} /> <span className="hidden md:inline">Receipt</span></button>
                                <button onClick={() => { setEditingRequest(null); setIsCreatingReq(true); }} className="bg-orange-600 text-white px-3 py-1.5 md:px-4 md:py-2 rounded-lg text-xs font-bold shadow hover:bg-orange-700 flex gap-1 md:gap-2 items-center transition-colors"><Icons.ShoppingCart size={16} /> <span className="hidden md:inline">Request</span></button>
                            </div>
                        </header>

                        {/* Critical Alert if Data is Empty */}
                        {isLoaded && masterData.length === 0 && (
                            <div className="bg-red-50 border-l-4 border-red-500 p-4 m-6 rounded-r-lg shadow-sm flex items-start gap-4">
                                <Icons.Target className="text-red-500 shrink-0 mt-0.5" size={24} />
                                <div>
                                    <h3 className="text-red-800 font-bold text-lg">ระบบไม่พบข้อมูลพัสดุในเครื่องนี้!</h3>
                                    <p className="text-red-600 text-sm mt-1">หากข้อมูลเดิมของคุณหายไป อาจเกิดจากเบราว์เซอร์ล้างแคช กรุณาไปที่เมนูด้านซ้ายล่าง กดปุ่ม <b className="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded">"ค้นหาข้อมูลเดิม (Scan)"</b> หรืออัปโหลดไฟล์ Backup (.json)</p>
                                </div>
                            </div>
                        )}

                        <div className="flex-1 overflow-auto p-4 md:p-6 bg-slate-50/50">
                            {activeView === 'REQ_SETUP' && <RequestSetupView reqConfig={reqConfig} setReqConfig={setReqConfig} masterData={masterData} setMasterData={setMasterData} requests={requests} setRequests={setRequests} personnel={personnel} companies={companies} showAlert={showAlert} showConfirm={showConfirm} />}
                            {activeView === 'MASTER' && <MasterDataViewWrapper masterData={masterData} setMasterData={setMasterData} categoryList={categoryList} setCategoryList={setCategoryList} unitList={unitList} setUnitList={setUnitList} showAlert={showAlert} showConfirm={showConfirm} />}
                            {activeView === 'CATEGORY' && <CategoryView categoryList={categoryList} setCategoryList={setCategoryList} showAlert={showAlert} showConfirm={showConfirm} />}
                            {activeView === 'UNIT' && <UnitView unitList={unitList} setUnitList={setUnitList} showAlert={showAlert} showConfirm={showConfirm} />}
                            {activeView === 'VENDOR' && <VendorView vendors={vendors} setVendors={setVendors} showAlert={showAlert} showConfirm={showConfirm} />}
                            {activeView === 'COMPANY' && <CompanyView companies={companies} setCompanies={setCompanies} showAlert={showAlert} showConfirm={showConfirm} />}
                            {activeView === 'PERSONNEL' && <PersonnelView personnel={personnel} setPersonnel={setPersonnel} showAlert={showAlert} showConfirm={showConfirm} />}
                            {activeView === 'PLAN_MANAGE' && <PlanManageView masterData={masterData} setMasterData={setMasterData} plans={plans} setPlans={setPlans} setIsPlanning={setIsPlanning} setEditingPlan={setEditingPlan} showConfirm={showConfirm} />}
                            {activeView === 'TRACKING' && <TrackingView masterData={masterData} categoryList={categoryList} setActiveView={setActiveView} />}
                            {activeView === 'STOCK_CARD' && <StockCardView masterData={masterData} categoryList={categoryList} />}
                            
                            {activeView === 'SUMMARY' && (() => {
                                const activeItems = sortMasterData(masterData.filter(m => isItemActive(m) && (summaryCat === 'ALL' || m.category === summaryCat)));
                                const totalIn = activeItems.reduce((acc, m) => acc + sumArrayQty(m.received), 0);
                                const totalOut = activeItems.reduce((acc, m) => acc + sumArrayQty(m.disbursed), 0);
                                
                                return (
                                    <div className="space-y-6 animate-in fade-in">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-2 gap-4">
                                            <h2 className="text-xl font-bold text-slate-800">Dashboard Summary</h2>
                                            <div className="flex flex-wrap items-center gap-3">
                                                <select className="border border-slate-300 p-2 rounded-lg text-sm bg-white min-w-[120px] outline-none focus:ring-2 focus:ring-blue-500" value={summaryCat} onChange={e=>setSummaryCat(e.target.value)}>
                                                    <option value="ALL">All Categories</option>
                                                    {(categoryList||[]).map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                                                </select>
                                                <button onClick={handleExportSummary} className="bg-blue-50 text-blue-700 border border-blue-200 px-3 py-2 rounded-lg text-xs font-bold shadow-sm hover:bg-blue-100 transition-colors flex items-center gap-1">
                                                    <Icons.Download size={14}/> Export
                                                </button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                            <div className="bg-white p-6 rounded-xl shadow border-l-4 border-blue-500">
                                                <div className="text-xs text-slate-500 font-bold uppercase tracking-wider">รายการพัสดุที่มีความเคลื่อนไหว</div>
                                                <div className="text-3xl font-black text-blue-700 mt-2">{activeItems.length} <span className="text-sm font-normal text-slate-400">รายการ</span></div>
                                            </div>
                                            <div className="bg-white p-6 rounded-xl shadow border-l-4 border-green-500">
                                                <div className="text-xs text-slate-500 font-bold uppercase tracking-wider">ยอดรับเข้ารวมทั้งหมด (Total In)</div>
                                                <div className="text-3xl font-black text-green-600 mt-2">{totalIn} <span className="text-sm font-normal text-slate-400">หน่วย</span></div>
                                            </div>
                                            <div className="bg-white p-6 rounded-xl shadow border-l-4 border-red-500">
                                                <div className="text-xs text-slate-500 font-bold uppercase tracking-wider">ยอดเบิกจ่ายรวมทั้งหมด (Total Out)</div>
                                                <div className="text-3xl font-black text-red-600 mt-2">{totalOut} <span className="text-sm font-normal text-slate-400">หน่วย</span></div>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-xl shadow overflow-hidden">
                                            <div className="p-4 border-b bg-slate-50 font-bold text-slate-700 flex gap-2 items-center">
                                                <Icons.LayoutDashboard size={18}/> รายละเอียดสต็อก (Stock Details)
                                            </div>
                                            <div className="overflow-x-auto">
                                            <table className="w-full text-sm text-left">
                                                <thead className="bg-slate-100 border-b">
                                                    <tr>
                                                        <th className="p-3 whitespace-nowrap">Item (พัสดุ)</th>
                                                        <th className="text-right p-3 w-32 whitespace-nowrap">In (รับเข้า)</th>
                                                        <th className="text-right p-3 w-32 whitespace-nowrap">Out (เบิกจ่าย)</th>
                                                        <th className="text-right p-3 w-32 whitespace-nowrap">Bal (คงเหลือ)</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {activeItems.map(m => {
                                                        const r = sumArrayQty(m.received); 
                                                        const d = sumArrayQty(m.disbursed);
                                                        
                                                        return (
                                                            <tr key={m.code} className="border-b hover:bg-slate-50">
                                                                <td className="p-3 font-bold align-middle min-w-[200px]">
                                                                    {m.name} 
                                                                    {m.brand && <span className="text-xs bg-gray-200 px-1 rounded ml-2 font-normal">{m.brand}</span>}
                                                                    <span className="text-xs text-slate-400 ml-1">({m.spec})</span>
                                                                    <div className="text-[10px] text-gray-400 font-mono mt-0.5">{m.code}</div>
                                                                </td>
                                                                <td className="text-right text-green-600 font-bold p-3 align-middle text-base border-l border-slate-100">{r}</td>
                                                                <td className="text-right text-red-600 font-bold p-3 align-middle text-base border-l border-slate-100">{d}</td>
                                                                <td className="text-right font-black p-3 align-middle border-l border-slate-100 bg-slate-50/30">
                                                                    <span className={r-d < 0 ? 'text-red-500 text-base' : 'text-slate-800 text-base'}>{r-d}</span> 
                                                                    <span className="text-xs font-normal text-slate-500 ml-1 block sm:inline">{m.unit}</span>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                    {activeItems.length === 0 && <tr><td colSpan="4" className="text-center p-8 text-slate-400">ไม่มีข้อมูล (No Active Items)</td></tr>}
                                                </tbody>
                                                <tfoot className="bg-slate-100 font-black border-t-2 border-slate-300">
                                                    <tr>
                                                        <td className="p-3 text-right uppercase text-slate-600">รวมทั้งหมด (Grand Total):</td>
                                                        <td className="p-3 text-right text-green-700 text-lg">{totalIn}</td>
                                                        <td className="p-3 text-right text-red-700 text-lg">{totalOut}</td>
                                                        <td className="p-3 text-right text-blue-700 text-lg">{totalIn - totalOut}</td>
                                                    </tr>
                                                </tfoot>
                                            </table>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })()}
                            
                            {activeView === 'REQUEST' && (
                                <div className="bg-white p-6 rounded-xl shadow border-t-4 border-orange-500 animate-in fade-in">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold flex items-center gap-2 text-orange-700"><Icons.FileText size={20}/> Request History</h3>
                                        <div className="flex gap-2">
                                            <button onClick={handleExportRequestHistory} className="bg-orange-50 text-orange-700 border border-orange-200 px-4 py-2 rounded text-xs font-bold shadow-sm hover:bg-orange-100 transition-colors flex items-center gap-1"><Icons.Download size={14}/> Export</button>
                                            <button onClick={() => { setEditingRequest(null); setIsCreatingReq(true); }} className="bg-orange-600 text-white px-4 py-2 rounded text-xs font-bold shadow hover:bg-orange-700 transition-colors">+ New Request</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                        {(requests||[]).map((req, idx) => (
                                            <div key={req.id} className="bg-white p-5 rounded-xl border border-slate-200 hover:border-orange-400 hover:shadow-md transition-all group relative">
                                                <div className="absolute top-4 right-4 flex gap-2">
                                                    <button onClick={() => setViewingRequestIdx(idx)} className="text-slate-300 hover:text-orange-500 transition-colors"><Icons.Eye size={20}/></button>
                                                    <button onClick={() => { setEditingRequest(req); setIsCreatingReq(true); }} className="text-slate-300 hover:text-blue-500 transition-colors"><Icons.Edit3 size={18}/></button>
                                                    <button onClick={() => deleteRequestRecord(req)} className="text-slate-300 hover:text-red-500 transition-colors"><Icons.Trash2 size={18}/></button>
                                                </div>
                                                <div className="flex justify-between items-start mb-3 pr-20">
                                                    <span className="bg-orange-100 text-orange-700 text-xs px-2 py-1 rounded font-bold group-hover:bg-orange-600 group-hover:text-white transition-colors">{req.sheetNo}</span>
                                                </div>
                                                <div className="text-xs text-slate-400 font-medium mb-3 flex items-center gap-1"><Icons.Calendar size={12}/> {formatDate(req.date)}</div>
                                                
                                                <p className="text-sm text-slate-600 mb-1"><span className="font-bold text-slate-400 text-xs uppercase mr-1">Company</span> <span className="font-semibold text-blue-700">{req.company || '-'}</span></p>
                                                <p className="text-sm text-slate-600 mb-1"><span className="font-bold text-slate-400 text-xs uppercase mr-1">Req. By</span> <span className="font-semibold text-slate-700">{req.from}</span></p>
                                                <p className="text-sm text-slate-600 mb-4 truncate"><span className="font-bold text-slate-400 text-xs uppercase mr-1">Work</span> {req.work || '-'}</p>
                                                
                                                <div className="border-t pt-3 text-sm text-slate-600 font-bold flex justify-between items-center">
                                                    <span className="text-xs text-slate-400">รายการเบิก:</span>
                                                    <span className="bg-slate-100 px-2 py-1 rounded text-slate-800">{req.items?.length || 0} items</span>
                                                </div>
                                            </div>
                                        ))}
                                        {(!requests || requests.length === 0) && <div className="col-span-full text-center p-12 text-slate-400 bg-slate-50 rounded-xl border border-dashed">ยังไม่มีประวัติการเบิก (No Request History)</div>}
                                    </div>
                                </div>
                            )}

                            {activeView === 'RECEIVING' && <ReceivingView vendors={vendors} masterData={masterData} setMasterData={setMasterData} receipts={receipts} setReceipts={setReceipts} categoryList={categoryList} setIsReceiving={setIsReceiving} setEditingReceipt={setEditingReceipt} plans={plans} showConfirm={showConfirm} showAlert={showAlert} />}
                        </div>
                    </main>

                    {/* MODALS */}
                    {isReceiving && <ReceivingModal 
                        isReceiving={isReceiving} setIsReceiving={setIsReceiving}
                        editingReceipt={editingReceipt} setEditingReceipt={setEditingReceipt}
                        vendors={vendors}
                        masterData={masterData} setMasterData={setMasterData}
                        receipts={receipts} setReceipts={setReceipts}
                        categoryList={categoryList}
                        plans={plans}
                        showAlert={showAlert}
                    />}
                    {isCreatingReq && <RequestModal 
                        isCreatingReq={isCreatingReq} setIsCreatingReq={setIsCreatingReq}
                        editingRequest={editingRequest} setEditingRequest={setEditingRequest}
                        reqConfig={reqConfig} setReqConfig={setReqConfig}
                        masterData={masterData} setMasterData={setMasterData}
                        personnel={personnel}
                        companies={companies}
                        requests={requests} setRequests={setRequests}
                        showAlert={showAlert}
                    />}
                    {viewingRequestIdx !== null && <RequestDetailModal 
                        requests={requests} 
                        viewingIdx={viewingRequestIdx} 
                        setViewingIdx={setViewingRequestIdx} 
                    />}
                    {isPlanning && <PlanningModal 
                        isPlanning={isPlanning} setIsPlanning={setIsPlanning}
                        editingPlan={editingPlan} setEditingPlan={setEditingPlan}
                        masterData={masterData} setMasterData={setMasterData}
                        plans={plans} setPlans={setPlans}
                        showAlert={showAlert}
                    />}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
