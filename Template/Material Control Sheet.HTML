<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Control SDE</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; font-size: 13px; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-input { background: transparent; text-align: center; width: 100%; outline: none; border-bottom: 1px dashed transparent; transition: all 0.2s; font-size: 11px; padding: 0; margin: 0; height: 16px; }
        .table-input:focus { background: white; border-bottom: 1px solid #3b82f6; color: #1e3a8a; }
        .table-input-date { font-size: 0.55rem; color: #64748b; margin-top: 1px; display: block; width: 100%; text-align: center; background: transparent; padding: 0; border: none; letter-spacing: -0.5px; height: 14px; outline: none; }
        .table-input-date::-webkit-calendar-picker-indicator { transform: scale(0.7); margin-left: -4px; cursor: pointer; padding: 0; }
        .table-input-ref { font-size: 0.55rem; color: #475569; font-weight: 600; margin-top: 1px; display: block; width: 100%; text-align: center; background: transparent; text-transform: uppercase; padding: 0; border: none; height: 14px; outline: none; }
        .detail-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 1px 0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;

        // --- UTILS & CORE EXPORTS ---
        const loadXLSX = (callback) => {
            if (window.XLSX) { if (callback) callback(); return; }
            const script = document.createElement('script');
            script.src = "https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js";
            script.onload = () => { if (callback) callback(); };
            document.head.appendChild(script);
        };

        const exportToExcel = (data, filename, sheetName = "Sheet1") => {
            if (window.XLSX) {
                const ws = window.XLSX.utils.json_to_sheet(data);
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, sheetName);
                window.XLSX.writeFile(wb, `${filename}.xlsx`);
            } else {
                alert("Excel Library loading... Please wait.");
                loadXLSX();
            }
        };

        const shareToLine = (title, textContent) => {
            let message = `📋 สรุปข้อมูล: ${title}\n📅 วันที่: ${new Date().toLocaleDateString('th-TH')}\n----------------\n${textContent}`;
            if (message.length > 2500) message = message.substring(0, 2500) + '\n\n... (ข้อมูลยาวเกินไป กรุณาดูในระบบเพิ่มเติม)';
            window.open(`https://line.me/R/msg/text/?${encodeURIComponent(message)}`, '_blank');
        };

        // --- ICONS ---
        const Icon = ({ children, className="", size=18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
        const Icons = {
            Menu: (p) => <Icon {...p}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>,
            Truck: (p) => <Icon {...p}><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></Icon>,
            ShoppingCart: (p) => <Icon {...p}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></Icon>,
            FileText: (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></Icon>,
            LayoutDashboard: (p) => <Icon {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></Icon>,
            Target: (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>,
            Database: (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></Icon>,
            Tag: (p) => <Icon {...p}><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><circle cx="7" cy="7" r="3"/></Icon>,
            Ruler: (p) => <Icon {...p}><path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Z"/><path d="m14.5 2.9 5.8 5.8"/><path d="m9.5 7.9 2.5 2.5"/><path d="m4.6 12.8 2.5 2.5"/></Icon>,
            Users: (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>,
            Store: (p) => <Icon {...p}><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7"/></Icon>,
            Building: (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></Icon>,
            Settings: (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>,
            Edit3: (p) => <Icon {...p}><path d="M12 20h9" /><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" /></Icon>,
            Trash2: (p) => <Icon {...p}><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></Icon>,
            X: (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>,
            Search: (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>,
            FileSpreadsheet: (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></Icon>,
            Download: (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Icon>,
            Upload: (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></Icon>,
            Save: (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>,
            Calendar: (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Icon>,
            ChevronLeft: (p) => <Icon {...p}><polyline points="15 18 9 12 15 6" /></Icon>,
            ChevronRight: (p) => <Icon {...p}><polyline points="9 18 15 12 9 6" /></Icon>,
            Eye: (p) => <Icon {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></Icon>,
            ClipboardList: (p) => <Icon {...p}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></Icon>,
            Book: (p) => <Icon {...p}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" /></Icon>,
            RefreshCw: (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>,
            MessageCircle: (p) => <Icon {...p}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></Icon>
        };

        // --- CONSTANTS & HELPERS ---
        const STORAGE_KEY = 'project_planner_db_v85_edit_receiving'; 
        
        const ROLE_REQUESTOR = "ผู้เบิก (Requestor)";
        const ROLE_INSPECTOR = "ผู้ตรวจ (Inspector)";
        const ROLE_APPROVER = "ผู้อนุมัติ (Approver)";
        const ROLE_DISPENSER = "ผู้จ่าย (Dispenser)";
        
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        const cleanString = (str) => str ? str.toString().trim().replace(/\s+/g, '').toLowerCase() : '';
        const safeLower = (str) => str ? String(str).toLowerCase() : '';
        const sumArrayQty = (arr) => arr ? arr.reduce((a, b) => a + Number(b.qty || 0), 0) : 0;
        const isItemActive = (m) => (m.boq > 0 || sumArrayQty(m.ordered) > 0 || sumArrayQty(m.received) > 0 || sumArrayQty(m.disbursed) > 0);

        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
            return dateStr;
        };

        const parseSizeToNumber = (spec) => {
            if (!spec) return null;
            const match = String(spec).trim().match(/^(\d+(?:[-\s]\d+\/\d+)?|\d+\/\d+|\d+(?:\.\d+)?)/);
            if (!match) return null;
            let valStr = match[0].replace(/\s/g, '-');
            if (valStr.includes('-') && valStr.includes('/')) {
                const parts = valStr.split('-');
                const fraction = parts[1].split('/');
                return parseFloat(parts[0]) + (parseFloat(fraction[0]) / parseFloat(fraction[1]));
            }
            if (valStr.includes('/')) {
                const parts = valStr.split('/');
                return parseFloat(parts[0]) / parseFloat(parts[1]);
            }
            return parseFloat(valStr);
        };

        const sortMasterData = (data) => {
            return [...data].sort((a, b) => {
                const catComp = (a.category||'').localeCompare(b.category||'', 'th');
                if (catComp !== 0) return catComp;
                const nameComp = (a.name||'').localeCompare(b.name||'', 'th');
                if (nameComp !== 0) return nameComp;
                const numA = parseSizeToNumber(a.spec);
                const numB = parseSizeToNumber(b.spec);
                if (numA !== null && numB !== null && numA !== numB) return numA - numB;
                return (a.spec||'').localeCompare(b.spec||'', 'th', { numeric: true });
            });
        };

        const generateNextCode = (existingData, tempCodes = [], abbr = 'GN') => {
          let maxId = 0;
          const safeAbbr = abbr || 'GN';
          const regex = new RegExp(`^${safeAbbr}-(\\d+)$`, 'i');
          const process = (code) => {
            if(!code) return;
            const match = String(code).match(regex);
            if (match) {
              const num = parseInt(match[1], 10);
              if (num > maxId) maxId = num;
            }
          };
          existingData.forEach(item => process(item.code));
          tempCodes.forEach(code => process(code));
          return `${safeAbbr.toUpperCase()}-${String(maxId + 1).padStart(3, '0')}`;
        };

        // --- SHARED COMPONENTS ---
        const SearchFilter = ({ searchTerm, setSearchTerm, searchField, setSearchField, placeholder, onSearchClick }) => (
            <div className="flex flex-col sm:flex-row gap-2 items-center w-full">
                <div className="flex bg-slate-100 rounded-lg p-1 gap-1 shrink-0 overflow-x-auto max-w-full border border-slate-200">
                    {[{ id: 'all', label: 'All' }, { id: 'name', label: 'Name' }, { id: 'spec', label: 'Spec' }, { id: 'category', label: 'Cat' }, { id: 'code', label: 'Code' }].map(field => (
                        <button key={field.id} onClick={() => setSearchField(field.id)} className={`px-3 py-1.5 text-xs rounded-md font-bold transition-all whitespace-nowrap flex items-center gap-1 ${searchField === field.id ? 'bg-white text-blue-600 shadow-sm border border-gray-100' : 'text-slate-500 hover:bg-slate-200'}`}>{field.label}</button>
                    ))}
                </div>
                <div className="relative flex-1 w-full flex gap-2">
                    <div className="relative w-full">
                        <input className="w-full border border-slate-300 p-2 pl-9 pr-8 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder={placeholder} value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                        <Icons.Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4 pointer-events-none" />
                        {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-300 hover:text-red-500 transition-colors p-1"><Icons.X size={14} /></button>}
                    </div>
                    <button onClick={onSearchClick} className="bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-lg shadow-md transition-all flex items-center justify-center shrink-0 active:scale-95"><Icons.Search size={18} /></button>
                </div>
            </div>
        );

        const DateInput = ({ value, onChange, className }) => {
            const [text, setText] = useState(formatDate(value));
            useEffect(() => { setText(formatDate(value)); }, [value]);

            const handleBlur = () => {
                if(!text.trim()) { onChange(''); setText(''); return; }
                const parts = text.split(/[-/]/);
                if (parts.length === 3) {
                    let d = parts[0].padStart(2, '0');
                    let m = parts[1].padStart(2, '0');
                    let yStr = parts[2];
                    let yNum = parseInt(yStr, 10);
                    let y;
                    
                    if (yStr.length === 2) {
                        if (yNum > 50) y = (yNum + 2500 - 543).toString(); 
                        else y = '20' + yStr; 
                    } else if (yStr.length === 4) {
                        if (yNum > 2500) y = (yNum - 543).toString(); 
                        else y = yStr;
                    }

                    if (y && y.length === 4) {
                        const iso = `${y}-${m}-${d}`;
                        if (!isNaN(new Date(iso).getTime())) {
                            onChange(iso);
                            setText(`${d}/${m}/${y}`);
                            return;
                        }
                    }
                }
                setText(formatDate(value));
            };

            return (
                <div className={`relative w-full border p-2 rounded bg-white flex items-center h-[38px] ${className || ''}`}>
                    <input 
                        type="text" 
                        value={text} 
                        onChange={e => setText(e.target.value)} 
                        onBlur={handleBlur}
                        placeholder="วว/ดด/ปปปป"
                        className="w-full h-full bg-transparent outline-none text-sm text-slate-700"
                    />
                    <div className="absolute right-0 w-10 h-full flex items-center justify-center cursor-pointer hover:bg-slate-50 rounded-r transition-colors">
                        <Icons.Calendar className="w-4 h-4 text-blue-500 pointer-events-none" />
                        <input 
                            type="date" 
                            value={value} 
                            onChange={e => { onChange(e.target.value); setText(formatDate(e.target.value)); }} 
                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                            title="เลือกจากปฏิทิน"
                        />
                    </div>
                </div>
            );
        };

        const InlineDateInput = ({ value, onChange }) => {
            const [text, setText] = useState(formatDate(value));
            useEffect(() => { setText(formatDate(value)); }, [value]);

            const handleBlur = () => {
                if(!text.trim()) { onChange(''); setText(''); return; }
                const parts = text.split(/[-/]/);
                if (parts.length === 3) {
                    let d = parts[0].padStart(2, '0'); let m = parts[1].padStart(2, '0'); let yStr = parts[2]; let yNum = parseInt(yStr, 10); let y;
                    if (yStr.length === 2) { y = (yNum > 50) ? (yNum + 2500 - 543).toString() : '20' + yStr; } 
                    else if (yStr.length === 4) { y = (yNum > 2500) ? (yNum - 543).toString() : yStr; }
                    if (y && y.length === 4) {
                        const iso = `${y}-${m}-${d}`;
                        if (!isNaN(new Date(iso).getTime())) { onChange(iso); setText(`${d}/${m}/${y}`); return; }
                    }
                }
                setText(formatDate(value));
            };

            return (
                <div className="relative w-full h-[14px] flex items-center mt-1 group bg-white border border-transparent hover:border-blue-200 focus-within:border-blue-500 rounded transition-colors">
                    <input type="text" value={text} onChange={e => setText(e.target.value)} onBlur={handleBlur} placeholder="DD/MM/YY" className="table-input-date flex-1 min-w-0 bg-transparent outline-none text-center" />
                    <div className="w-[14px] h-full relative overflow-hidden flex-shrink-0 cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity">
                        <Icons.Calendar size={10} className="text-blue-500 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none" />
                        <input type="date" value={value} onChange={e => { onChange(e.target.value); setText(formatDate(e.target.value)); }} className="absolute inset-0 w-[300%] h-full opacity-0 cursor-pointer -ml-4" />
                    </div>
                </div>
            );
        };

        // --- VIEWS ---
        const MasterDataViewWrapper = ({ masterData, setMasterData, categoryList, setCategoryList, unitList, setUnitList, showAlert, showConfirm }) => {
            const [form, setForm] = useState({ code: '', name: '', brand: '', spec: '', unit: unitList?.[0]?.name || 'Pcs', category: categoryList?.[0]?.name || 'General', boq: '' });
            const [search, setSearch] = useState('');
            const [searchField, setSearchField] = useState('all');
            const [isEdit, setIsEdit] = useState(false);
            const [editId, setEditId] = useState(null);
            const [editFormData, setEditFormData] = useState({});
            
            useEffect(() => {
                if (categoryList && categoryList.length > 0 && (!form.category || !categoryList.find(c => c.name === form.category))) {
                    setForm(prev => ({ ...prev, category: categoryList[0].name }));
                }
                if (unitList && unitList.length > 0 && (!form.unit || !unitList.find(u => u.name === form.unit))) {
                    setForm(prev => ({ ...prev, unit: unitList[0].name }));
                }
            }, [categoryList, unitList]);
            
            const saveItem = () => {
                const notify = showAlert || window.alert;
                if (!form.name) return notify("กรุณาระบุชื่อพัสดุ", "ข้อมูลไม่ครบถ้วน");
                let code = form.code;
                const catList = categoryList || [];
                if(!code) {
                    const catObj = catList.find(c => c.name === form.category);
                    const abbr = catObj ? catObj.abbr : 'GN';
                    code = generateNextCode(masterData, [], abbr);
                }
                const item = { ...form, code, id: isEdit ? editId : generateId(), boq: Number(form.boq)||0, ordered:[], received:[], disbursed:[] };

            const handleImport = (e) => {

                        if(window.XLSX) {

                                    if(!name || String(name).trim() === '') return;

                                    let brand = keys['brand'] || keys['manufacturer'] || keys['ยี่ห้อ'] || '';
                                    let spec = keys['spec/size'] || keys['spec'] || keys['specification'] || keys['ขนาด'] || '-';

                                    let boq = Number(keys['boq'] || keys['quantity'] || keys['จำนวน'] || 0);

                                    const existingIdx = newM.findIndex(m => cleanString(m.name) === cleanString(name) && cleanString(m.spec) === cleanString(spec));
                                    
                                    if(existingIdx > -1) { countSkipped++; } 
                                    else {
                                        if (!code) { code = generateNextCode(newM, tempCodes, sheetAbbr); tempCodes.push(code); }

                            e.target.value = null;
                        } else { notify("Excel Library is loading... please wait.", "ยังไม่พร้อมใช้งาน"); loadXLSX(); }
                };

                     window.XLSX.utils.book_append_sheet(wb, ws2, "Architect");

            const handleExport = () => {

            const filteredData = sortMasterData(masterData.filter(m => {
                const term = safeLower(search);

                if (searchField === 'all') return safeLower(m.name).includes(term) || safeLower(m.code).includes(term) || safeLower(m.spec).includes(term) || safeLower(m.category).includes(term);

                            </div>
                            <div><label className="text-[10px] uppercase font-bold text-slate-500">Brand (ยี่ห้อ)</label><input className="w-full border p-2 rounded text-sm" placeholder="Brand" value={form.brand} onChange={e=>setForm({...form, brand:e.target.value})} /></div>

                            <div><label className="text-[10px] uppercase font-bold text-slate-500">BOQ</label><input className="w-full border p-2 rounded text-sm" type="number" placeholder="BOQ" value={form.boq} onChange={e=>setForm({...form, boq:e.target.value})} /></div>

                for(let i=1; i<=maxR; i++) head2.push(`#${i}`);
                head2.push("Total");
                for(let i=1; i<=maxD; i++) head2.push(`#${i}`);
                head2.push("Total", "Final Bal");
                wsTrackingData.push(head2);

                // Header Merges Configuration
                let cIdx = 7;
                merges.push({s:{r:0, c:cIdx}, e:{r:0, c:cIdx+maxP+1}}); // Planning Ordered
                cIdx += maxP+2;
                merges.push({s:{r:0, c:cIdx}, e:{r:0, c:cIdx+maxR}}); // Received Record
                cIdx += maxR+1;
                merges.push({s:{r:0, c:cIdx}, e:{r:0, c:cIdx+maxD}}); // Disbursed Record

                // Data Processing
                filtered.forEach(m => {
                    const totalP = sumArrayQty(m.ordered); 
                    const totalR = sumArrayQty(m.received); 
                    const totalD = sumArrayQty(m.disbursed);
                    
                    let row = [m.code, m.name, m.brand||'-', m.spec||'-', m.unit, m.category, m.boq];

                    for(let i=0; i<maxP; i++) {
                        const o = m.ordered && m.ordered[i];
                        row.push(o && o.qty ? `${o.qty}\n${o.prNo||'-'}\n${formatDate(o.date)}` : '');
                    }
                    row.push(totalP, (m.boq||0) - totalP);

                    for(let i=0; i<maxR; i++) {
                        const r = m.received && m.received[i];
                        row.push(r && r.qty ? `${r.qty}\n${r.deliveryNo||'-'}\n${formatDate(r.date)}` : '');
                    }
                    row.push(totalR);

                    for(let i=0; i<maxD; i++) {
                        const d = m.disbursed && m.disbursed[i];
                        row.push(d && d.qty ? `${d.qty}\n${d.reqNo||'-'} ${d.company ? `(${d.company})` : ''}\n${formatDate(d.date)}` : '');
                    }
                    row.push(totalD, totalR - totalD);

                    wsTrackingData.push(row);
                });

                const wsTracking = window.XLSX.utils.aoa_to_sheet(wsTrackingData);
                wsTracking['!merges'] = merges;
                window.XLSX.utils.book_append_sheet(wb, wsTracking, "Tracking Board");

                // --- 2. STOCK CARD SHEET (Detailed Material Ledger) ---
                const wsLedgerData = [];
                filtered.forEach(m => {
                    wsLedgerData.push([`Material Code : ${m.code}`, `Material : ${m.name} ${m.spec !== '-' ? m.spec : ''}`, `Brand : ${m.brand||'-'}`, `Unit : ${m.unit}`]);
                    wsLedgerData.push(["IC Date", "Description/Supplier", "Doc. No.", "Ref Doc.", "Receipt Qty", "Issue Qty", "Balance Qty"]);
                    
                    let runningBal = 0;
                    let totalRec = 0;
                    let totalIss = 0;

                    let txns = [];
                    (m.received || []).forEach(r => {
                        txns.push({ date: r.date, desc: r.vendor, docNo: r.receiptId || '-', ref: r.deliveryNo || r.prNo || '-', recQty: Number(r.qty), issQty: 0, timestamp: r.timestamp || 0 });
                    });
                    (m.disbursed || []).forEach(d => {
                        txns.push({ date: d.date, desc: d.company || d.from || 'Issue', docNo: d.reqNo, ref: d.work || '-', recQty: 0, issQty: Number(d.qty), timestamp: d.timestamp || 0 });
                    });

                    // Sort by Date, then Timestamp, then Receipt before Issue
                    txns.sort((a,b) => {
                        const dateComp = String(a.date).localeCompare(String(b.date));
                        if (dateComp !== 0) return dateComp;
                        const tA = a.timestamp || 0;
                        const tB = b.timestamp || 0;
                        if (tA !== tB) return tA - tB;
                        if (a.recQty > 0 && b.issQty > 0) return -1;
                        if (a.issQty > 0 && b.recQty > 0) return 1;
                        return 0;
                    });

                    txns.forEach(t => {
                        runningBal += t.recQty;
                        runningBal -= t.issQty;
                        totalRec += t.recQty;
                        totalIss += t.issQty;
                        wsLedgerData.push([
                            formatDate(t.date), t.desc, t.docNo, t.ref, 
                            t.recQty ? t.recQty.toFixed(2) : '', 
                            t.issQty ? t.issQty.toFixed(2) : '', 
                            runningBal.toFixed(2)
                        ]);
                    });

                    wsLedgerData.push(["", "", "", "Total Material Code : " + m.code, totalRec > 0 ? totalRec.toFixed(2) : '0.00', totalIss > 0 ? totalIss.toFixed(2) : '0.00', runningBal.toFixed(2)]);
                    wsLedgerData.push([]); 
                    wsLedgerData.push([]); 
                });

                const wsLedger = window.XLSX.utils.aoa_to_sheet(wsLedgerData);
                wsLedger['!cols'] = [ {wch: 12}, {wch: 35}, {wch: 18}, {wch: 15}, {wch: 12}, {wch: 12}, {wch: 12} ];
                window.XLSX.utils.book_append_sheet(wb, wsLedger, "Stock Card");

                window.XLSX.writeFile(wb, "Tracking_And_StockCard.xlsx");
            };

            return (
                <div className="bg-white p-4 rounded-xl shadow border border-slate-200 overflow-x-auto animate-in fade-in">
                    <div className="mb-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div className="flex gap-4 items-center">
                            <h3 className="font-bold text-lg text-slate-700 whitespace-nowrap flex items-center gap-2"><Icons.Target size={20}/> Tracking Board</h3>
                            <button onClick={handleExport} className="bg-green-50 text-green-700 border border-green-200 px-3 py-1.5 rounded text-xs font-bold shadow-sm hover:bg-green-100 flex gap-1 items-center transition-colors"><Icons.Download size={14}/> Export Excel</button>
                            <button onClick={() => setActiveView('PLAN_MANAGE')} className="bg-blue-600 text-white px-3 py-1.5 rounded text-xs font-bold shadow hover:bg-blue-700 flex gap-1 items-center transition-colors"><Icons.ClipboardList size={14}/> Add Plan</button>
                        </div>
                        <div className="w-full md:w-auto flex gap-2 items-center">
                            <select className="border border-slate-300 p-2 rounded-lg text-sm bg-white min-w-[120px] outline-none focus:ring-2 focus:ring-blue-500" value={filterCategory} onChange={e=>setFilterCategory(e.target.value)}>
                                <option value="ALL">All Categories</option>
                                {(categoryList||[]).map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                            </select>
                            <SearchFilter searchTerm={searchTerm} setSearchTerm={setSearchTerm} searchField={searchField} setSearchField={setSearchField} onSearchClick={()=>setSearchTerm('')} placeholder="Search Materials..." />
                        </div>
                    </div>
                    <table className="w-max text-[10px] border-collapse">
                        <thead>
                            <tr className="uppercase tracking-widest text-white">
                                <th className="bg-slate-700 text-white border-r border-slate-500 py-2" colSpan={7}>Materials Info</th>
                                <th className="bg-blue-600 text-white border-r border-blue-400 py-2 font-bold text-lg" colSpan={maxP+2}>Planning Ordered</th>
                                <th className="bg-orange-500 border-r border-orange-400 py-2 font-bold text-lg text-white" colSpan={maxR+1}>Received Record</th>
                                <th className="bg-green-600 border-r border-green-500 py-2 font-bold text-lg text-white" colSpan={maxD+1}>Disbursed Record</th>
                                <th className="bg-emerald-200 text-slate-800 border-r border-emerald-300 py-2" colSpan={1}>Balance</th>
                            </tr>
                            <tr className="bg-slate-100 font-bold border-b-2">
                                <th className="p-2 border-r">Code</th><th className="p-2 border-r min-w-[150px]">Name</th><th className="p-2 border-r">Brand</th><th className="p-2 border-r">Spec</th><th className="p-2 border-r">Unit</th><th className="p-2 border-r">Cat</th><th className="p-2 border-r bg-white">BOQ</th>
                                {pCols.map(i=> <th key={`p-${i}`} className="p-0.5 border-r bg-blue-50 w-[85px] min-w-[85px] max-w-[85px] overflow-hidden leading-tight">#{i}</th>)}<th className="p-2 bg-blue-100 border-r">Total</th><th className="p-2 bg-yellow-100 border-r">Plan.Bal</th>
                                {rCols.map(i=> <th key={`r-${i}`} className="p-0.5 border-r bg-orange-50 w-[85px] min-w-[85px] max-w-[85px] overflow-hidden leading-tight">#{i}</th>)}<th className="p-2 bg-orange-100 border-r">Total</th>
                                {dCols.map(i=> <th key={`d-${i}`} className="p-0.5 border-r bg-green-50 w-[85px] min-w-[85px] max-w-[85px] overflow-hidden leading-tight">#{i}</th>)}<th className="p-2 bg-green-100 border-r">Total</th><th className="p-2 bg-emerald-100 border-r">Final Bal</th>
                            </tr>
                        </thead>
                        <tbody>
                            {filtered.map((m, idx) => {
                                const totalP = sumArrayQty(m.ordered); const totalR = sumArrayQty(m.received); const totalD = sumArrayQty(m.disbursed); 
                                return (
                                    <tr key={m.id || m.code || idx} className="hover:bg-slate-50 border-b">
                                        <td className="p-2 border-r font-mono text-blue-600">{m.code}</td>
                                        <td className="p-2 border-r font-bold">{m.name}</td>
                                        <td className="p-2 border-r text-center">{m.brand}</td>
                                        <td className="p-2 border-r">{m.spec}</td>
                                        <td className="p-2 border-r text-center">{m.unit}</td>
                                        <td className="p-2 border-r text-center">{m.category}</td>
                                        <td className="p-2 border-r text-center font-bold bg-white text-sm">{m.boq}</td>
                                        {pCols.map((_, i) => { 
                                            const o = (m.ordered && m.ordered[i]) || {}; 
                                            return (
                                                <td key={`pc-${i}`} className="p-1 border-r align-top bg-blue-50/20 w-[85px] min-w-[85px] max-w-[85px] overflow-hidden text-center">
                                                    {o.qty ? <div className="detail-cell"><span className="font-bold text-blue-600 text-[11px] leading-tight">{o.qty}</span><span className="text-[8px] text-gray-500 font-bold mt-0.5 leading-tight truncate w-full">{o.prNo||'-'}</span><span className="text-[7px] text-slate-400 leading-tight truncate w-full">{formatDate(o.date)}</span></div> : '-'}
                                                </td>
                                            ) 
                                        })}
                                        <td className="p-2 border-r text-center font-bold bg-blue-50">{totalP}</td>
                                        <td className="p-2 border-r text-center font-bold bg-yellow-50">{(m.boq||0)-totalP}</td>
                                        {rCols.map((_, i) => { const r = (m.received && m.received[i]) || {}; return <td key={`rc-${i}`} className="p-0.5 border-r align-top bg-orange-50/20 text-center w-[85px] min-w-[85px] max-w-[85px] overflow-hidden">{r.qty ? <div className="detail-cell"><span className="font-bold text-orange-600 text-[11px] leading-tight">{r.qty}</span><span className="text-[8px] text-gray-500 font-bold mt-0.5 leading-tight truncate w-full">{r.deliveryNo||'DO-?'}</span><span className="text-[7px] text-slate-400 leading-tight truncate w-full">{formatDate(r.date)}</span></div> : '-'}</td> })}
                                        <td className="p-2 border-r text-center font-bold bg-orange-100">{totalR}</td>
                                        {dCols.map((_, i) => { const d = (m.disbursed && m.disbursed[i]) || {}; return <td key={`dc-${i}`} className="p-0.5 border-r align-top bg-green-50/20 text-center w-[85px] min-w-[85px] max-w-[85px] overflow-hidden">{d.qty ? <div className="detail-cell"><span className="font-bold text-green-600 text-[11px] leading-tight">{d.qty}</span><span className="text-[8px] text-gray-500 font-bold mt-0.5 leading-tight truncate w-full">{d.reqNo||'REQ-?'} {d.company ? `(${d.company})` : ''}</span><span className="text-[7px] text-slate-400 leading-tight truncate w-full">{formatDate(d.date)}</span></div> : '-'}</td> })}
                                        <td className="p-2 border-r text-center font-bold bg-green-100">{totalD}</td>
                                        <td className="p-2 border-r text-center font-black bg-emerald-100">{totalR - totalD}</td>
                                    </tr>
                                );
                            })}
                            {filtered.length === 0 && <tr><td colSpan="24" className="text-center p-8 text-slate-400">ไม่มีข้อมูลที่มีความเคลื่อนไหว (No Active Items)</td></tr>}
                        </tbody>
                    </table>
                </div>
            );
        };

        const ReceivingView = ({ vendors, masterData, setMasterData, receipts, setReceipts, categoryList, setIsReceiving, setEditingReceipt, showConfirm }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [searchField, setSearchField] = useState('all');

            const editReceipt = (r) => { setEditingReceipt(r); setIsReceiving(true); };
            const deleteReceipt = (r) => {
                showConfirm("ต้องการลบใบรับเข้านี้ใช่หรือไม่?\nยอดที่รับเข้าในสต็อกจะถูกหักออกด้วย", () => {
                    let newMaster = [...masterData];
                    r.items.forEach(oldItem => {
                        const mIdx = newMaster.findIndex(m => m.code === oldItem.code);
                        if (mIdx > -1 && newMaster[mIdx].received) {
                            const rIdx = newMaster[mIdx].received.findIndex(x => x.receiptId === r.id);
                            if (rIdx > -1) {
                                newMaster[mIdx].received.splice(rIdx, 1);
                            } else {
                                const fIdx = newMaster[mIdx].received.findIndex(x => 
                                    x.vendor === r.vendor && x.date === r.date && Number(x.qty) === Number(oldItem.qty)
                                );
                                if (fIdx > -1) newMaster[mIdx].received.splice(fIdx, 1);
                            }
                        }
                    });
                    setMasterData(newMaster);
                    setReceipts(prev => prev.filter(x => x.id !== r.id));
                });
            };

            const filteredReceipts = (receipts||[]).filter(r => {
                const term = safeLower(searchTerm);
                if(!term) return true;
                return safeLower(r.do).includes(term) || safeLower(r.pr).includes(term) || safeLower(r.vendor).includes(term) || safeLower(r.date).includes(term);
            });
            
            const handleExport = () => {
                let exportData = [];
                filteredReceipts.forEach(r => {
                    r.items.forEach(it => {
                        exportData.push({
                            "Receipt ID": r.id,
                            "Date": formatDate(r.date),
                            "Vendor": r.vendor,
                            "DO No.": r.do,
                            "PR No.": r.pr,
                            "Material Code": it.code,
                            "Material Name": it.name,
                            "Spec": it.spec,
                            "Unit": it.unit,
                            "Qty Received": it.qty
                        });
                    });
                });
                exportToExcel(exportData, "ReceivingHistory", "Receipts");
            };

            return (
                <div className="bg-white p-6 rounded-xl shadow border-t-4 border-green-500 animate-in fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                        <h3 className="font-bold flex items-center gap-2 text-green-700 whitespace-nowrap"><Icons.Truck size={20}/> Receiving History</h3>
                        <div className="flex gap-2 w-full md:w-auto items-center">
                             <SearchFilter searchTerm={searchTerm} setSearchTerm={setSearchTerm} searchField={searchField} setSearchField={setSearchField} onSearchClick={()=>setSearchTerm('')} placeholder="Search DO/PR/Vendor..." />
                            <button onClick={handleExport} className="bg-blue-50 text-blue-700 border border-blue-200 px-3 py-2 rounded text-xs font-bold shadow-sm hover:bg-blue-100 transition-colors whitespace-nowrap flex items-center gap-1"><Icons.Download size={14}/> Export</button>
                            <button onClick={() => { setEditingReceipt(null); setIsReceiving(true); }} className="bg-green-600 text-white px-4 py-2 rounded text-xs font-bold shadow hover:bg-green-700 transition-colors whitespace-nowrap">+ New Receipt</button>
                        </div>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-slate-50 border-b">
                                <tr>
                                    <th className="p-3">Ref ID</th>
                                    <th className="p-3">Date</th>
                                    <th className="p-3">Vendor</th>
                                    <th className="p-3">DO / PR</th>
                                    <th className="p-3 text-center">Items</th>
                                    <th className="p-3 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredReceipts.map(r=>(
                                    <tr key={r.id} className="border-b hover:bg-slate-50">
                                        <td className="p-3 font-mono text-xs text-gray-500">{r.id}</td>
                                        <td className="p-3 font-medium">{formatDate(r.date)}</td>
                                        <td className="p-3 font-bold text-slate-700">{r.vendor}</td>
                                        <td className="p-3 text-xs text-slate-500">{r.do || '-'} / {r.pr || '-'}</td>
                                        <td className="p-3 text-center font-bold text-green-700">{r.items.length}</td>
                                        <td className="p-3 text-center flex justify-center gap-2">
                                            <button onClick={() => editReceipt(r)} className="text-blue-500 hover:bg-blue-100 p-1.5 rounded transition-colors"><Icons.Edit3 size={16}/></button>
                                            <button onClick={() => deleteReceipt(r)} className="text-red-500 hover:bg-red-100 p-1.5 rounded transition-colors"><Icons.Trash2 size={16}/></button>
                                        </td>
                                    </tr>
                                ))}
                                {filteredReceipts.length===0 && <tr><td colSpan="6" className="p-12 text-center text-slate-400">ไม่มีข้อมูลประวัติการรับเข้า</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const StockCardView = ({ masterData, categoryList }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategory, setFilterCategory] = useState('ALL');
            const [filterSupplier, setFilterSupplier] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            // ดึงเฉพาะรายการที่มีความเคลื่อนไหว (มีรับเข้า หรือ มีเบิกออก)
            const activeItems = masterData.filter(m => (m.received && m.received.length > 0) || (m.disbursed && m.disbursed.length > 0));
            
            const filtered = sortMasterData(activeItems.filter(item => {
                if (filterCategory !== 'ALL' && item.category !== filterCategory) return false;
                const term = safeLower(searchTerm);
                if (!term) return true;
                return safeLower(item.name).includes(term) || safeLower(item.code).includes(term) || safeLower(item.spec).includes(term);
            }));

            // ฟังก์ชันสำหรับจัดเรียงรายการ (วันที่ -> เวลาทำรายการ -> รับเข้าก่อนเบิกออก)
            const sortTransactions = (txns) => {
                return txns.sort((a, b) => {
                    const dateComp = String(a.date).localeCompare(String(b.date));
                    if (dateComp !== 0) return dateComp;
                    const tA = a.timestamp || 0;
                    const tB = b.timestamp || 0;
                    if (tA !== tB) return tA - tB;
                    // ถ้าวันที่เดียวกันและไม่มี Timestamp (ข้อมูลเก่า) ให้เอา รับเข้า(recQty) ขึ้นก่อน เบิกออก(issQty) เสมอ
                    if (a.recQty > 0 && b.issQty > 0) return -1;
                    if (a.issQty > 0 && b.recQty > 0) return 1;
                    return 0;
                });
            };

            const handleExport = () => {
                if (!window.XLSX) {
                    alert("Excel Library is loading... Please wait.");
                    loadXLSX();
                    return;
                }

                const wb = window.XLSX.utils.book_new();
                const wsData = [];
                
                filtered.forEach(m => {
                    let bfQty = 0;
                    let totalRec = 0;
                    let totalIss = 0;

                    let txns = [];
                    (m.received || []).forEach(r => txns.push({ date: r.date, desc: r.vendor, docNo: r.receiptId || '-', ref: r.deliveryNo || r.prNo || '-', recQty: Number(r.qty), issQty: 0, timestamp: r.timestamp || 0 }));
                    (m.disbursed || []).forEach(d => txns.push({ date: d.date, desc: d.company || d.from || 'Issue', docNo: d.reqNo, ref: d.work || '-', recQty: 0, issQty: Number(d.qty), timestamp: d.timestamp || 0 }));

                    sortTransactions(txns);

                    let currentBal = 0;
                    let displayTxns = [];

                    txns.forEach(t => {
                        currentBal += t.recQty;
                        currentBal -= t.issQty;

                        let inDateRange = true;
                        if (startDate && t.date < startDate) {
                            inDateRange = false;
                            bfQty += t.recQty;
                            bfQty -= t.issQty;
                        }
                        if (endDate && t.date > endDate) {
                            inDateRange = false;
                        }

                        let matchSupplier = true;
                        if (filterSupplier && !safeLower(t.desc).includes(safeLower(filterSupplier))) {
                            matchSupplier = false;
                        }

                        if (inDateRange && matchSupplier) {
                            totalRec += t.recQty;
                            totalIss += t.issQty;
                            displayTxns.push({ ...t, runningBal: currentBal });
                        }
                    });

                    // ถ้าไม่มีรายการที่แสดงเลยหลังจากการ Filter ให้ข้ามสินค้านี้ไป (เว้นแต่ต้องการแสดงยอด Bf)
                    if (displayTxns.length === 0 && !startDate) return;

                    // Header แถวบนสุดของตารางแต่ละไอเทม
                    wsData.push([`Material Code : ${m.code}`, `Material : ${m.name} ${m.spec !== '-' ? m.spec : ''}`, `Brand : ${m.brand||'-'}`, `Unit : ${m.unit}`]);
                    // หัวคอลัมน์
                    wsData.push(["IC Date", "Description/Supplier", "Doc. No.", "Ref Doc.", "Receipt Qty", "Issue Qty", "Balance Qty"]);
                    
                    if (startDate && !filterSupplier) { // ยอดยกมา จะแสดงสมบูรณ์ที่สุดเมื่อไม่ได้กรอง Supplier
                        wsData.push([
                            formatDate(startDate), "Brought Forward (ยอดยกมา)", "-", "-", 
                            "", "", bfQty.toFixed(2)
                        ]);
                    }

                    displayTxns.forEach(t => {
                        wsData.push([
                            formatDate(t.date), t.desc, t.docNo, t.ref, 
                            t.recQty ? t.recQty.toFixed(2) : '', 
                            t.issQty ? t.issQty.toFixed(2) : '', 
                            t.runningBal.toFixed(2)
                        ]);
                    });

                    // สรุปยอด Total ของที่กรองได้
                    wsData.push(["", "", "", "Total Material Code : " + m.code, totalRec > 0 ? totalRec.toFixed(2) : '0.00', totalIss > 0 ? totalIss.toFixed(2) : '0.00', runningBal.toFixed(2)]);
                    wsData.push([]); 
                    wsData.push([]); 
                });

                if (wsData.length === 0) {
                    alert("ไม่มีข้อมูลที่จะส่งออก (อาจเพราะเงื่อนไขการกรองไม่มีข้อมูลตรงกัน)");
                    return;
                }

                const ws = window.XLSX.utils.aoa_to_sheet(wsData);
                // กำหนดความกว้างคอลัมน์ให้พอดีสวยงาม

        const RequestSetupView = ({ reqConfig, setReqConfig, masterData, setMasterData, requests, setRequests, personnel, companies, showAlert }) => {

                setMq(''); 
                setShowAll(false);

                const n = [...manualForm.items];

                const mItem = masterData.find(m=>m.code===itemCode);

                let newQty = Number(val);
                if (newQty > stock) { showAlert(`เบิกเกินสต็อก! (เหลือสูงสุด ${stock})`, "แจ้งเตือน"); newQty = stock; }

                setManualForm(prev => ({...prev, items: n}));

            const saveManualRequest = () => {
                if(!manualForm.id) return showAlert("กรุณาระบุเลขที่ใบเบิก", "ข้อมูลไม่ครบถ้วน");

                const newMaster = [...masterData];
                manualForm.items.forEach(item => {
                    const idx = newMaster.findIndex(m => m.code === item.code);
                    if(idx > -1) { 
                        if(!newMaster[idx].disbursed) newMaster[idx].disbursed = []; 
                        newMaster[idx].disbursed.push({ qty: Number(item.qty), date: manualForm.date, reqNo: manualForm.id, company: manualForm.company, timestamp: Date.now() }); 
                    }
                });
                setMasterData(newMaster); 
                showAlert("บันทึกประวัติใบเบิกย้อนหลังเรียบร้อย", "สำเร็จ");
                setManualForm({ id: '', date: new Date().toISOString().split('T')[0], from: '', company: '', work: '', items: [] });

            const searchResults = sortMasterData(masterData.filter(m => {

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 bg-red-50 min-h-screen font-sans text-center flex flex-col items-center justify-center">
                            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg border-t-4 border-red-600">
                                <h1 className="text-2xl font-bold text-red-600 mb-4">🚨 ระบบเกิดข้อผิดพลาดร้ายแรง</h1>
                                <p className="text-slate-600 mb-6">หน้าจอไม่สามารถแสดงผลได้ แต่ข้อมูลของคุณยังปลอดภัยอยู่ในเครื่อง!</p>
                                <button 
                                    onClick={() => {
                                        let best='', max=0;
                                        for(let i=0; i<localStorage.length; i++){
                                            let v = localStorage.getItem(localStorage.key(i));
                                            if(v && v.includes('masterData') && v.length>max){ max=v.length; best=v; }
                                        }
                                        if(best){
                                            const a=document.createElement('a');
                                            a.href=URL.createObjectURL(new Blob([best], {type:'application/json'}));
                                            a.download='Emergency_Backup.json';
                                            a.click();
                                        } else alert('ไม่พบข้อมูลสำรอง');
                                    }}
                                    className="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg mb-4 w-full transition-colors"
                                >
                                    ⬇️ ดาวน์โหลดข้อมูลสำรอง (Backup)
                                </button>
                                <button 
                                    onClick={() => { localStorage.removeItem('project_planner_db_v85_edit_receiving'); window.location.reload(); }}
                                    className="text-slate-400 hover:text-slate-600 underline text-sm"
                                >
                                    ล้างข้อมูลและรีเฟรชหน้าจอ (Reset)
                                </button>
                                <div className="mt-6 p-4 bg-slate-100 rounded text-left text-xs font-mono text-red-800 overflow-auto max-h-40">
                                    {this.state.error && this.state.error.toString()}
                                </div>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const App = () => {

            const [editingPlan, setEditingPlan] = useState(null);
