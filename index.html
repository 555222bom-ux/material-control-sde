        // --- DATABASE HELPERS (IndexedDB) ---
        const DB_NAME = 'MaterialControlDB';
        const STORE_NAME = 'appData';

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const saveToDB = async (key, data) => {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).put(data, key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            } catch (e) { console.error("DB Save Error:", e); }
        };

        const loadFromDB = async (key) => {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const request = tx.objectStore(STORE_NAME).get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            } catch (e) { console.error("DB Load Error:", e); return null; }
        };

        const exportElementToPdf = async (elementId, filename = 'Export.pdf') => {
            const target = document.getElementById(elementId);
            if (!target) throw new Error('PDF export target not found');
            if (!window.html2canvas || !window.jspdf || !window.jspdf.jsPDF) {
                throw new Error('PDF libraries are not ready yet');
            }

            const { jsPDF } = window.jspdf;
            const canvas = await window.html2canvas(target, {
                scale: Math.max(2, window.devicePixelRatio || 1),
                useCORS: true,
                backgroundColor: '#ffffff',
                logging: false,
                ignoreElements: (el) => el && el.classList && el.classList.contains('pdf-hide')
            });

            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const margin = 8;
            const printableWidth = pageWidth - (margin * 2);
            const printableHeight = pageHeight - (margin * 2);
            const imageHeight = (canvas.height * printableWidth) / canvas.width;
            const imgData = canvas.toDataURL('image/jpeg', 0.95);

            let heightLeft = imageHeight;
            let position = margin;
            pdf.addImage(imgData, 'JPEG', margin, position, printableWidth, imageHeight, undefined, 'FAST');
            heightLeft -= printableHeight;

            while (heightLeft > 0) {
                position = margin - (imageHeight - heightLeft);
                pdf.addPage();
                pdf.addImage(imgData, 'JPEG', margin, position, printableWidth, imageHeight, undefined, 'FAST');
                heightLeft -= printableHeight;
            }

            pdf.save(filename.endsWith('.pdf') ? filename : `${filename}.pdf`);

        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
            return dateStr;
        };

        const parseSizeToNumber = (spec) => {
            if (!spec) return null;
            const match = String(spec).trim().match(/^(\d+(?:[-\s]\d+\/\d+)?|\d+\/\d+|\d+(?:\.\d+)?)/);
            if (!match) return null;
            let valStr = match[0].replace(/\s/g, '-');
            if (valStr.includes('-') && valStr.includes('/')) {
                const parts = valStr.split('-');
                const fraction = parts[1].split('/');
                return parseFloat(parts[0]) + (parseFloat(fraction[0]) / parseFloat(fraction[1]));
            }
            if (valStr.includes('/')) {
                const parts = valStr.split('/');
                return parseFloat(parts[0]) / parseFloat(parts[1]);
            }
            return parseFloat(valStr);
        };

        const sortMasterData = (data) => {
            return [...data].sort((a, b) => {
                const catComp = String(a.category ?? '').localeCompare(String(b.category ?? ''), 'th');
                if (catComp !== 0) return catComp;
                const nameComp = String(a.name ?? '').localeCompare(String(b.name ?? ''), 'th');
                if (nameComp !== 0) return nameComp;
                const numA = parseSizeToNumber(a.spec);
                const numB = parseSizeToNumber(b.spec);
                if (numA !== null && numB !== null && numA !== numB) return numA - numB;
                return String(a.spec ?? '').localeCompare(String(b.spec ?? ''), 'th', { numeric: true });
            });
        };

        const generateNextCode = (existingData, tempCodes = [], abbr = 'GN') => {
          let maxId = 0;
          const safeAbbr = abbr || 'GN';
          const regex = new RegExp(`^${escapeRegExp(safeAbbr)}-(\\d+)$`, 'i');
          const process = (code) => {
            if(!code) return;
            const match = String(code).match(regex);
            if (match) {
              const num = parseInt(match[1], 10);
              if (num > maxId) maxId = num;
            }
          };
          existingData.forEach(item => process(item.code));
          tempCodes.forEach(code => process(code));
          return `${safeAbbr.toUpperCase()}-${String(maxId + 1).padStart(3, '0')}`;
        };

        const escapeRegExp = (str = '') => String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const escapeHtml = (str = '') => String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        const highlightText = (text, keyword) => {
            const rawText = String(text ?? '');
            if (!keyword) return escapeHtml(rawText);
            const escapedKeyword = escapeRegExp(keyword);
            if (!escapedKeyword) return escapeHtml(rawText);
            return escapeHtml(rawText).replace(new RegExp(escapedKeyword, 'gi'), match => `<mark class="bg-indigo-200">${match}</mark>`);
        };
        const makeMasterDuplicateKey = (item = {}) => [item.category, item.name, item.spec, item.unit].map(cleanString).join('|');
        const getUniquePersonnelOptions = (personnel = [], role = null) => {
            const seen = new Set();
            return (personnel || [])
                .filter(p => p && p.name && (!role || p.role === role))
                .filter(p => {
                    const key = safeLower(p.name);
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                })
                .sort((a, b) => String(a.name).localeCompare(String(b.name), 'th'));
        };

        const toSafeArray = (value) => Array.isArray(value) ? value : [];
        const toSafeNumber = (value, fallback = 0) => {
            const n = Number(value);
            return Number.isFinite(n) ? n : fallback;
        };
        const trimOrEmpty = (value) => String(value ?? '').trim();
        const normalizeDateString = (value) => {
            const s = trimOrEmpty(value);
            if (!s) return '';
            const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!m) return s;
            const [, y, mo, d] = m;
            const dt = new Date(`${y}-${mo}-${d}T00:00:00`);
            if (Number.isNaN(dt.getTime())) return '';
            if (dt.getFullYear() !== Number(y) || (dt.getMonth() + 1) !== Number(mo) || dt.getDate() !== Number(d)) return '';
            return `${y}-${mo}-${d}`;
        };
        const normalizeMasterItem = (m = {}) => ({
            id: trimOrEmpty(m.id) || generateId(),
            code: trimOrEmpty(m.code),
            name: trimOrEmpty(m.name),
            brand: trimOrEmpty(m.brand),
            spec: trimOrEmpty(m.spec) || '-',
            unit: trimOrEmpty(m.unit) || 'Pcs',
            category: normalizeCategoryName(m.category) || 'General',
            boq: toSafeNumber(m.boq, 0),
            ordered: toSafeArray(m.ordered).filter(x => toSafeNumber(x?.qty, 0) > 0).map(x => ({ ...x, qty: toSafeNumber(x.qty, 0), date: normalizeDateString(x.date) })),
            received: toSafeArray(m.received).filter(x => toSafeNumber(x?.qty, 0) > 0).map(x => ({ ...x, qty: toSafeNumber(x.qty, 0), date: normalizeDateString(x.date) })),
            disbursed: toSafeArray(m.disbursed).filter(x => toSafeNumber(x?.qty, 0) > 0).map(x => ({ ...x, qty: toSafeNumber(x.qty, 0), date: normalizeDateString(x.date) }))
        });
        const normalizeAppData = (raw = {}) => {
            const safe = raw && typeof raw === 'object' ? raw : {};
            const categoryList = [];
            const categorySeen = new Set();
            toSafeArray(safe.categoryList).forEach((c, idx) => {
                const rawName = trimOrEmpty(c?.name) || (idx === 0 ? 'General' : '');
                const name = normalizeCategoryName(rawName);
                if (!name) return;
                const key = cleanString(name);
                if (categorySeen.has(key)) return;
                categorySeen.add(key);
                const abbrRaw = normalizeCategoryAbbr(rawName, c?.abbr);
                categoryList.push({ id: trimOrEmpty(c?.id) || `CAT-${idx + 1}`, name, abbr: abbrRaw.replace(/[^A-Za-z0-9_-]/g, '').toUpperCase() || 'GN' });
            });
            if (!categoryList.length) categoryList.push({ id: 'CAT-1', name: 'General', abbr: 'GN' });

            const unitList = [];
            const unitSeen = new Set();
            toSafeArray(safe.unitList).forEach((u, idx) => {
                const name = trimOrEmpty(u?.name) || (idx === 0 ? 'Pcs' : '');
                if (!name) return;
                const key = cleanString(name);
                if (unitSeen.has(key)) return;
                unitSeen.add(key);
                unitList.push({ id: trimOrEmpty(u?.id) || `UNIT-${idx + 1}`, name });
            });
            if (!unitList.length) unitList.push({ id: 'UNIT-1', name: 'Pcs' });

            const personnel = [];
            const personSeen = new Set();
            toSafeArray(safe.personnel).forEach((p, idx) => {
                const name = trimOrEmpty(p?.name);
                if (!name) return;
                const role = trimOrEmpty(p?.role);
                const key = `${cleanString(name)}|${cleanString(role)}`;
                if (personSeen.has(key)) return;
                personSeen.add(key);
                personnel.push({ id: trimOrEmpty(p?.id) || `P-${idx + 1}`, name, role });
            });

            const vendors = [];
            const vendorSeen = new Set();
            toSafeArray(safe.vendors).forEach((v, idx) => {
                const name = trimOrEmpty(v?.name);
                if (!name) return;
                const key = cleanString(name);
                if (vendorSeen.has(key)) return;
                vendorSeen.add(key);
                vendors.push({ id: trimOrEmpty(v?.id) || `V-${idx + 1}`, name });
            });

            const companies = [];
            const companySeen = new Set();
            toSafeArray(safe.companies).forEach((c, idx) => {
                const name = trimOrEmpty(c?.name);
                if (!name) return;
                const key = cleanString(name);
                if (companySeen.has(key)) return;
                companySeen.add(key);
                companies.push({ id: trimOrEmpty(c?.id) || `C-${idx + 1}`, name });
            });
            if (!companies.length) companies.push({ id: 'COMPANY-1', name: 'บริษัทหลัก (Main Contractor)' });

            const masterData = [];
            const masterSeen = new Set();
            toSafeArray(safe.masterData).forEach((m) => {
                const normalized = normalizeMasterItem(m);
                if (!normalized.name) return;
                const key = normalized.id || makeMasterDuplicateKey(normalized);
                if (masterSeen.has(key)) return;
                masterSeen.add(key);
                masterData.push(normalized);
            });

            const planSeen = new Set();
            const plans = [];
            toSafeArray(safe.plans).forEach((p, idx) => {
                const prNo = trimOrEmpty(p?.prNo);
                if (!prNo) return;
                const key = cleanString(prNo);
                if (planSeen.has(key)) return;
                planSeen.add(key);
                plans.push({
                    id: trimOrEmpty(p?.id) || `PLAN-${idx + 1}`,
                    prNo,
                    date: normalizeDateString(p?.date) || new Date().toISOString().split('T')[0],
                    items: toSafeArray(p?.items).filter(it => trimOrEmpty(it?.code) && toSafeNumber(it?.qty, 0) > 0).map(it => ({ ...it, code: trimOrEmpty(it.code), qty: toSafeNumber(it.qty, 0) }))
                });
            });

            const receiptSeen = new Set();
            const receipts = [];
            toSafeArray(safe.receipts).forEach((r, idx) => {
                const id = trimOrEmpty(r?.id) || `REC-${idx + 1}`;
                if (receiptSeen.has(id)) return;
                receiptSeen.add(id);
                receipts.push({
                    ...r,
                    id,
                    vendor: trimOrEmpty(r?.vendor),
                    date: normalizeDateString(r?.date) || new Date().toISOString().split('T')[0],
                    do: trimOrEmpty(r?.do),
                    pr: trimOrEmpty(r?.pr),
                    items: toSafeArray(r?.items).filter(it => trimOrEmpty(it?.code) && toSafeNumber(it?.qty, 0) > 0).map(it => ({ ...it, code: trimOrEmpty(it.code), qty: toSafeNumber(it.qty, 0) }))
                });
            });

            const requestSeen = new Set();
            const requests = [];
            toSafeArray(safe.requests).forEach((r, idx) => {
                const id = trimOrEmpty(r?.id) || trimOrEmpty(r?.sheetNo) || `REQ-${idx + 1}`;
                if (requestSeen.has(id)) return;
                requestSeen.add(id);
                requests.push({
                    ...r,
                    id,
                    sheetNo: trimOrEmpty(r?.sheetNo) || id,
                    from: trimOrEmpty(r?.from),
                    checker: trimOrEmpty(r?.checker),
                    approver: trimOrEmpty(r?.approver),
                    dispenser: trimOrEmpty(r?.dispenser),
                    company: trimOrEmpty(r?.company),
                    work: trimOrEmpty(r?.work),
                    date: normalizeDateString(r?.date) || new Date().toISOString().split('T')[0],
                    status: trimOrEmpty(r?.status) || 'Approved',
                    items: toSafeArray(r?.items).filter(it => trimOrEmpty(it?.code) && toSafeNumber(it?.qty, 0) > 0).map(it => ({ ...it, code: trimOrEmpty(it.code), qty: toSafeNumber(it.qty, 0) }))
                });
            });

            return {
                reqConfig: {
                    prefix: trimOrEmpty(safe.reqConfig?.prefix) || 'REQ-24-',
                    nextRun: Math.max(1, parseInt(safe.reqConfig?.nextRun, 10) || 1)
                },
                masterData,
                categoryList,
                unitList,
                personnel,
                requests,
                receipts,
                plans,
                vendors,
                companies,
            };
        };
        const persistLocalBackup = (dataObj) => {
            try {
                const payload = JSON.stringify(dataObj);
                localStorage.setItem(STORAGE_KEY, payload);
                localStorage.setItem(`${STORAGE_KEY}__last_good`, payload);
                localStorage.setItem(`${STORAGE_KEY}__saved_at`, new Date().toISOString());
            } catch (e) {
                console.error('Local backup save error:', e);
            }
        };
        const createEmptyReceiptForm = () => ({ id: '', vendor: '', date: new Date().toISOString().split('T')[0], do: '', pr: '', items: [] });
        const createEmptyPlanForm = () => ({ id: '', prNo: '', date: new Date().toISOString().split('T')[0], items: [] });
        const createEmptyRequestForm = (reqConfig = { prefix: 'REQ-', nextRun: 1 }) => {
            const nextRun = Number(reqConfig?.nextRun || 1);
            const numStr = String(nextRun).padStart(4, '0');
            const sheetNo = `${reqConfig?.prefix || 'REQ-'}${numStr}`;
            return { id: sheetNo, sheetNo, date: new Date().toISOString().split('T')[0], company: '', from: '', checker: '', approver: '', dispenser: '', work: '', items: [] };
        };
        const createEmptyManualRequestForm = () => ({ id: '', date: new Date().toISOString().split('T')[0], from: '', checker: '', approver: '', dispenser: '', company: '', work: '', items: [] });


        // --- SHARED COMPONENTS ---
        const SearchFilter = ({ searchTerm, setSearchTerm, searchField, setSearchField, placeholder, onSearchClick }) => (
            <div className="flex flex-col sm:flex-row gap-2 items-center w-full">
                <div className="flex bg-slate-100 rounded-lg p-1 gap-1 shrink-0 overflow-x-auto max-w-full border border-slate-200">
                    {[{ id: 'all', label: 'All' }, { id: 'name', label: 'Name' }, { id: 'spec', label: 'Spec' }, { id: 'category', label: 'Cat' }, { id: 'code', label: 'Code' }].map(field => (
                        <button key={field.id} onClick={() => setSearchField(field.id)} className={`px-3 py-1.5 text-xs rounded-md font-bold transition-all whitespace-nowrap flex items-center gap-1 ${searchField === field.id ? 'bg-white text-blue-600 shadow-sm border border-gray-100' : 'text-slate-500 hover:bg-slate-200'}`}>{field.label}</button>
                    ))}
                </div>
                <div className="relative flex-1 w-full flex gap-2">
                    <div className="relative w-full">
                        <input className="w-full border border-slate-300 p-2 pl-9 pr-8 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder={placeholder} value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                        <Icons.Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4 pointer-events-none" />
                        {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-300 hover:text-red-500 transition-colors p-1"><Icons.X size={14} /></button>}
                    </div>
                    <button onClick={onSearchClick} className="bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-lg shadow-md transition-all flex items-center justify-center shrink-0 active:scale-95"><Icons.Search size={18} /></button>
                </div>
            </div>
        );

        const DateInput = ({ value, onChange, className }) => {
            const [text, setText] = useState(formatDate(value));
            useEffect(() => { setText(formatDate(value)); }, [value]);

            const handleBlur = () => {
                if(!text.trim()) { onChange(''); setText(''); return; }
                const parts = text.split(/[-/]/);
                if (parts.length === 3) {
                    let d = parts[0].padStart(2, '0');
                    let m = parts[1].padStart(2, '0');
                    let yStr = parts[2];
                    let yNum = parseInt(yStr, 10);
                    let y;
                    
                    if (yStr.length === 2) {
                        if (yNum > 50) y = (yNum + 2500 - 543).toString(); 
                        else y = '20' + yStr; 
                    } else if (yStr.length === 4) {
                        if (yNum > 2500) y = (yNum - 543).toString(); 
                        else y = yStr;
                    }

                    if (y && y.length === 4) {
                        const iso = `${y}-${m}-${d}`;
                        const dt = new Date(`${iso}T00:00:00`);
                        if (!isNaN(dt.getTime()) && dt.getFullYear() === Number(y) && (dt.getMonth() + 1) === Number(m) && dt.getDate() === Number(d)) {
                            onChange(iso);
                            setText(`${d}/${m}/${y}`);
                            return;
                        }
                    }
                }
                setText(formatDate(value));
            };

            return (
                <div className={`relative w-full border p-2 rounded bg-white flex items-center h-[38px] ${className || ''}`}>
                    <input 
                        type="text" 
                        value={text} 
                        onChange={e => setText(e.target.value)} 
                        onBlur={handleBlur}
                        placeholder="วว/ดด/ปปปป"
                        className="w-full h-full bg-transparent outline-none text-sm text-slate-700"
                    />
                    <div className="absolute right-0 w-10 h-full flex items-center justify-center cursor-pointer hover:bg-slate-50 rounded-r transition-colors">
                        <Icons.Calendar className="w-4 h-4 text-blue-500 pointer-events-none" />
                        <input 
                            type="date" 
                            value={value} 
                            onChange={e => { onChange(e.target.value); setText(formatDate(e.target.value)); }} 
                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                            title="เลือกจากปฏิทิน"
                        />
                    </div>
                </div>
            );
        };

        // --- FULL MODALS (Restored Functionality & Connected PR to Receipt & Auto-add Personnel) ---
        const ReceivingModal = ({ setIsReceiving, editingReceipt, setEditingReceipt, vendors, masterData, setMasterData, receipts, setReceipts, plans, showAlert }) => {
            const [form, setForm] = useState(() => editingReceipt ? { ...editingReceipt, items: (editingReceipt.items || []).map(it => ({ ...it })) } : createEmptyReceiptForm());
            const [mq, setMq] = useState('');
            const [showAll, setShowAll] = useState(false);
            const [showPR, setShowPR] = useState(false);

            useEffect(() => {
                setForm(editingReceipt ? { ...editingReceipt, items: (editingReceipt.items || []).map(it => ({ ...it })) } : createEmptyReceiptForm());
                setMq('');
                setShowAll(false);
                setShowPR(false);
            }, [editingReceipt]);

            const pendingPRs = (plans || []).map(plan => {
                const pendingItems = [];
                plan.items.forEach(pItem => {
                    const mItem = masterData.find(m => m.code === pItem.code);
                    let receivedQty = 0;
                    if (mItem && mItem.received) {
                        receivedQty = mItem.received
                            .filter(r => r.prNo === plan.prNo && r.receiptId !== form.id)
                            .reduce((sum, r) => sum + Number(r.qty), 0);
                    }
                    const pending = Number(pItem.qty) - receivedQty;
                    if (pending > 0) {
                        // ปรับให้ qty เริ่มต้นเป็นค่าว่าง ('') เพื่อให้ผู้ใช้กรอกเอง
                        pendingItems.push({ ...(mItem || pItem), pendingQty: pending, qty: '' });
                    }
                });
                return { ...plan, pendingItems };
            }).filter(plan => plan.pendingItems.length > 0);

            const searchResults = sortMasterData(masterData.filter(m => {
                const term = safeLower(mq);
                if (!term) return showAll;
                return safeLower(m.name).includes(term) || safeLower(m.code).includes(term) || safeLower(m.spec).includes(term);
            }));

            const addItem = (m) => {
                if (form.items.find(i => i.code === m.code)) return showAlert("พัสดุนี้ถูกเลือกแล้ว");
                // ปรับให้ qty เริ่มต้นเป็นค่าว่าง ('') เพื่อให้ผู้ใช้กรอกเอง
                setForm(prev => ({ ...prev, items: [...prev.items, { ...m, qty: '' }] }));
                setMq(''); setShowAll(false);
            };

            const selectPR = (plan) => {
                let newItems = [...form.items];
                plan.pendingItems.forEach(pi => {
                    const existingIdx = newItems.findIndex(i => i.code === pi.code);
                    if (existingIdx > -1) {
                        newItems[existingIdx].qty = ''; // เคลียร์ค่าให้เป็นช่องว่าง
                        newItems[existingIdx].pendingQty = pi.pendingQty;
                    } else {
                        newItems.push({ ...pi, qty: '' }); // นำเข้าแบบค่าว่าง
                    }
                });
                setForm(prev => ({ ...prev, pr: plan.prNo, items: newItems }));
                setShowPR(false);
            };

            const updateQty = (idx, val) => {
                const n = [...form.items];
                let newQty = val; // รับค่ามาเป็น string เพื่อให้ลบเป็นค่าว่างได้
                
                if (val !== '' && n[idx].pendingQty !== undefined && Number(newQty) > n[idx].pendingQty) {
                    showAlert(`รับเกินยอดที่สั่งใน PR! (ยอดค้างรับสูงสุดคือ ${n[idx].pendingQty})`, "แจ้งเตือน");
                    newQty = n[idx].pendingQty;
                }
                
                n[idx].qty = newQty;
                setForm(prev => ({ ...prev, items: n }));
            };

            const removeItem = (idx) => {
                const n = [...form.items];
                n.splice(idx, 1);
                setForm(prev => ({ ...prev, items: n }));
            };

            const handleSave = () => {
                if (!form.vendor) return showAlert("กรุณาระบุ Vendor (ร้านค้า)", "ข้อมูลไม่ครบถ้วน");
                
                // กรองเอาเฉพาะรายการที่มีการระบุตัวเลขรับเข้า มากกว่า 0 เท่านั้น (รายการที่เว้นว่างไว้จะถูกละทิ้งอัตโนมัติ)
                const itemsToSave = form.items.filter(it => it.qty !== '' && toSafeNumber(it.qty, 0) > 0).map(it => ({ ...it, qty: toSafeNumber(it.qty, 0) }));
                
                if (itemsToSave.length === 0) {
                    return showAlert("กรุณาระบุยอดรับเข้าพัสดุอย่างน้อย 1 รายการ", "ข้อมูลไม่ครบถ้วน");
                }

                const isEdit = !!editingReceipt;
                const recId = isEdit ? editingReceipt.id : `REC-${Date.now()}`;
                const newRec = { ...form, vendor: trimOrEmpty(form.vendor), do: trimOrEmpty(form.do), pr: trimOrEmpty(form.pr), id: recId, items: itemsToSave };

                let newMaster = [...masterData];
                if (isEdit) {
                    editingReceipt.items.forEach(oldItem => {
                        const mIdx = newMaster.findIndex(m => m.code === oldItem.code);
                        if (mIdx > -1 && newMaster[mIdx].received) {
                            newMaster[mIdx].received = newMaster[mIdx].received.filter(x => x.receiptId !== editingReceipt.id);
                        }
                    });

                newRec.items.forEach(item => {

                        newMaster[mIdx].received.push({
                            receiptId: recId, vendor: form.vendor, deliveryNo: form.do, prNo: form.pr, date: form.date, qty: Number(item.qty), timestamp: Date.now()
                        });
                    }
                });

                setMasterData(newMaster);
                if (isEdit) setReceipts(prev => prev.map(r => r.id === recId ? newRec : r));
                else setReceipts(prev => [newRec, ...prev]);

                showAlert(isEdit ? "อัปเดตใบรับเข้าสำเร็จ" : "บันทึกใบรับเข้าสำเร็จ", "สำเร็จ");
                setIsReceiving(false);
                setEditingReceipt(null);
            };

            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100]">

                            <button onClick={() => { setIsReceiving(false); setEditingReceipt(null); }} className="text-slate-400 hover:text-red-500 transition-colors p-1"><Icons.X size={24}/></button>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                <div>

                                    <select className="w-full border p-2 rounded mt-1 bg-white focus:ring-2 focus:ring-green-500 outline-none" value={form.vendor} onChange={e=>setForm({...form, vendor:e.target.value})}>

            const [form, setForm] = useState(() => editingRequest ? { ...editingRequest, items: (editingRequest.items || []).map(it => ({ ...it })) } : createEmptyRequestForm(reqConfig));
            const [mq, setMq] = useState('');
            const [showAll, setShowAll] = useState(false);

            const inspectorOptions = getUniquePersonnelOptions(personnel, ROLE_INSPECTOR);

            const dispenserOptions = getUniquePersonnelOptions(personnel, ROLE_DISPENSER);

            useEffect(() => {
                if (editingRequest) {
                    setForm({ ...editingRequest, items: (editingRequest.items || []).map(it => ({ ...it })) });
                } else if (isCreatingReq) {
                    setForm(createEmptyRequestForm(reqConfig));
                }
                setMq('');
                setShowAll(false);
            }, [editingRequest, isCreatingReq, reqConfig.prefix, reqConfig.nextRun]);

            const searchResults = sortMasterData(masterData.filter(m => {
                const term = safeLower(mq);
                if (!term) return showAll;
                return safeLower(m.name).includes(term) || safeLower(m.code).includes(term) || safeLower(m.spec).includes(term);
            }));

            const addItem = (m) => {
                if (form.items.find(i => i.code === m.code)) return showAlert("พัสดุนี้ถูกเลือกแล้ว");
                setForm(prev => ({ ...prev, items: [...prev.items, { ...m, qty: 1 }] }));
                setMq(''); setShowAll(false);
            };

            const updateQty = (idx, val) => {
                const n = [...form.items];
                n[idx].qty = Number(val);
                setForm(prev => ({ ...prev, items: n }));
            };

            const removeItem = (idx) => {
                const n = [...form.items];
                n.splice(idx, 1);
                setForm(prev => ({ ...prev, items: n }));
            };

            const handleSave = () => {
                if (!form.company) return showAlert("กรุณาระบุ Company (บริษัทผู้รับเหมา)", "ข้อมูลไม่ครบถ้วน");
                if (form.items.length === 0) return showAlert("กรุณาเลือกพัสดุอย่างน้อย 1 รายการ", "ข้อมูลไม่ครบถ้วน");
                const cleanedItems = form.items.filter(it => toSafeNumber(it.qty, 0) > 0).map(it => ({ ...it, qty: toSafeNumber(it.qty, 0) }));
                if (cleanedItems.length === 0) return showAlert("กรุณาระบุจำนวนเบิกที่มากกว่า 0 อย่างน้อย 1 รายการ", "ข้อมูลไม่ครบถ้วน");
                if (!editingRequest && requests.some(r => r.id === (form.id || form.sheetNo) || r.sheetNo === (form.sheetNo || form.id))) {
                    return showAlert("เลขที่ใบเบิกนี้มีอยู่แล้ว กรุณาสร้างเลขใหม่หรือแก้ไขรายการเดิม", "เลขที่เอกสารซ้ำ");
                }

                // Auto-add personnel if not exists
                if (form.from) {
                    const nameStr = form.from.trim();
                    const exists = (personnel||[]).find(p => safeLower(p.name) === safeLower(nameStr));
                    if (!exists && nameStr !== '') {
                        setPersonnel(prev => [...(prev||[]), { id: `P-${Date.now()}-${Math.random().toString(36).substr(2,5)}`, name: nameStr, role: 'ผู้เบิก (Requestor)' }]);
                    }
                }

                const isEdit = !!editingRequest;
                const newReq = { ...form, items: cleanedItems, id: form.id || form.sheetNo, sheetNo: form.sheetNo || form.id, status: 'Approved' };

                let newMaster = [...masterData];
                if (isEdit) {
                    editingRequest.items.forEach(oldItem => {
                        const mIdx = newMaster.findIndex(m => m.code === oldItem.code);
                        if (mIdx > -1 && newMaster[mIdx].disbursed) {
                            newMaster[mIdx].disbursed = newMaster[mIdx].disbursed.filter(x => x.reqNo !== editingRequest.id);
                        }
                    });
                }
                newReq.items.forEach(item => {
                    const mIdx = newMaster.findIndex(m => m.code === item.code);
                    if (mIdx > -1) {
                        if (!newMaster[mIdx].disbursed) newMaster[mIdx].disbursed = [];
                        newMaster[mIdx].disbursed.push({
                            reqNo: newReq.id, company: form.company, from: form.from, checker: form.checker, approver: form.approver, dispenser: form.dispenser, work: form.work, date: form.date, qty: Number(item.qty), timestamp: Date.now()
                        });
                    }
                });

                setMasterData(newMaster);
                if (isEdit) {
                    setRequests(prev => prev.map(r => r.id === form.id ? newReq : r));
                } else {
                    setRequests(prev => [newReq, ...prev]);
                    setReqConfig(prev => ({ ...prev, nextRun: prev.nextRun + 1 })); 
                }

                showAlert(isEdit ? "อัปเดตใบเบิกสำเร็จ" : "บันทึกใบเบิกสำเร็จ", "สำเร็จ");
                setIsCreatingReq(false);
                setEditingRequest(null);
            };

            return (

                            <button onClick={() => { setIsCreatingReq(false); setEditingRequest(null); }} className="text-slate-400 hover:text-red-500 transition-colors p-1"><Icons.X size={24}/></button>

                                    <label className="text-xs font-bold text-slate-500 uppercase">Company (บริษัทผู้รับเหมา)</label>

                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase">Requestor (ชื่อผู้เบิก)</label>
                                    <select className="w-full border p-2 rounded mt-1 bg-white focus:ring-2 focus:ring-orange-500 outline-none" value={form.from || ''} onChange={e=> setForm({...form, from: e.target.value})}>
                                        <option value="">-- เลือกผู้เบิก --</option>
                                        {requestorOptions.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase">Inspector (ผู้ตรวจ)</label>
                                    <select className="w-full border p-2 rounded mt-1 bg-white focus:ring-2 focus:ring-orange-500 outline-none" value={form.checker || ''} onChange={e=> setForm({...form, checker: e.target.value})}>
                                        <option value="">-- เลือกผู้ตรวจ --</option>
                                        {inspectorOptions.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase">Approver (ผู้อนุมัติ)</label>
                                    <select className="w-full border p-2 rounded mt-1 bg-white focus:ring-2 focus:ring-orange-500 outline-none" value={form.approver || ''} onChange={e=> setForm({...form, approver: e.target.value})}>
                                        <option value="">-- เลือกผู้อนุมัติ --</option>
                                        {approverOptions.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase">Dispenser (ผู้จ่าย)</label>
                                    <select className="w-full border p-2 rounded mt-1 bg-white focus:ring-2 focus:ring-orange-500 outline-none" value={form.dispenser || ''} onChange={e=> setForm({...form, dispenser: e.target.value})}>

                            </div>

                                    </div>
                                    <button onClick={()=>setShowAll(!showAll)} className="bg-slate-200 text-slate-700 px-4 rounded font-bold hover:bg-slate-300 transition-colors">Show All</button>

                                {(mq || showAll) && (
                                    <div className="absolute w-full top-[72px] left-0 bg-white border shadow-2xl max-h-60 overflow-y-auto z-10 rounded-b-lg">
                                        {searchResults.map(m=>{
                                            const stock = sumArrayQty(m.received) - sumArrayQty(m.disbursed);
                                            return (
                                                <div key={m.code} className="p-3 hover:bg-orange-50 border-b cursor-pointer flex justify-between items-center transition-colors" onClick={()=>addItem(m)}>
                                                    <div>
                                                        <div className="font-bold text-slate-800">{m.name}</div>
                                                        <div className="text-xs mt-0.5"><span className="text-orange-600 font-bold mr-2">{m.brand || '-'}</span><span className="text-gray-500">{m.spec}</span><span className="text-gray-400 ml-2 font-mono">{m.code}</span></div>
                                                    </div>
                                                    <span className={`text-xs font-black px-2 py-1 rounded ${stock>0?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>Stock: {stock}</span>

                                    </div>
                                )}
                            </div>

                            {form.items.length > 0 && (
                                <div className="border border-slate-200 rounded-xl overflow-hidden bg-white shadow-sm">

                                        <tbody className="divide-y">
                                            {form.items.map((it,i)=>(
                                                <tr key={i} className="hover:bg-slate-50">
                                                    <td className="p-3 text-center font-black text-slate-500">{i + 1}</td>
                                                    <td className="p-3"><div className="font-bold text-slate-800">{it.name} <span className="text-slate-400 text-xs font-normal">({it.spec})</span></div><div className="text-xs text-slate-400 font-mono mt-0.5">{it.code}</div></td>
                                                    <td className="p-2"><input type="number" min="0.01" step="0.01" className="w-full border text-center rounded p-1.5 focus:ring-2 focus:ring-orange-500 outline-none font-bold text-orange-700 bg-orange-50" value={it.qty} onChange={e=>updateQty(i,e.target.value)}/></td>
                                                    <td className="p-2 text-center"><button onClick={()=>removeItem(i)} className="text-red-400 hover:text-red-600 p-1 bg-red-50 hover:bg-red-100 rounded transition-colors"><Icons.Trash2 size={16}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                        <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">

                            <button onClick={handleSave} className="bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white px-8 py-2.5 rounded-xl font-bold shadow-lg shadow-orange-600/15 hover:shadow-orange-600/20 transition-all hover:scale-[1.02] active:scale-[0.98] flex gap-2 items-center"><Icons.Save size={18}/> บันทึกใบเบิก</button>
                        </div>
                    </div>
                </div>
            );
        };

        const RequestDetailModal = ({ requests, viewingIdx, setViewingIdx }) => {
            const req = requests[viewingIdx];
            if (!req) return null;
            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[90vh] overflow-hidden">
                        <div className="p-4 border-b bg-slate-50 flex justify-between items-center">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icons.FileText className="text-orange-600"/> รายละเอียดใบเบิก (Request Details)</h2>
                            <button onClick={() => setViewingIdx(null)} className="text-slate-400 hover:text-red-500 transition-colors p-1"><Icons.X size={24}/></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-4">
                            <div className="grid grid-cols-2 gap-4 text-sm bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <div><span className="font-bold text-slate-500">Req No:</span> <span className="font-bold text-blue-700">{req.sheetNo}</span></div>
                                <div><span className="font-bold text-slate-500">Date:</span> {formatDate(req.date)}</div>
                                <div><span className="font-bold text-slate-500">Company:</span> {req.company}</div>
                                <div><span className="font-bold text-slate-500">Requestor:</span> {req.from || '-'}</div>
                                <div><span className="font-bold text-slate-500">Inspector:</span> {req.checker || '-'}</div>
                                <div><span className="font-bold text-slate-500">Approver:</span> {req.approver || '-'}</div>
                                <div><span className="font-bold text-slate-500">Dispenser:</span> {req.dispenser || '-'}</div>
                                <div className="col-span-2"><span className="font-bold text-slate-500">Work/Location:</span> {req.work || '-'}</div>

        const PlanningModal = ({ isPlanning, setIsPlanning, editingPlan, setEditingPlan, masterData, setMasterData, plans, setPlans, showAlert }) => {
            const [form, setForm] = useState(() => editingPlan ? { ...editingPlan, items: (editingPlan.items || []).map(it => ({ ...it })) } : createEmptyPlanForm());

            }, [editingPlan]);

            const searchResults = sortMasterData(masterData.filter(m => {
                const term = safeLower(mq);

                return safeLower(m.name).includes(term) || safeLower(m.code).includes(term) || safeLower(m.spec).includes(term);
            }));

            const addItem = (m) => {
                if (form.items.find(i => i.code === m.code)) return showAlert("พัสดุนี้ถูกเลือกแล้ว");
                setForm(prev => ({ ...prev, items: [...prev.items, { ...m, qty: 1 }] }));
                setMq(''); setShowAll(false);

            const updateQty = (idx, val) => {
                const n = [...form.items];

            const removeItem = (idx) => {
                const n = [...form.items];

            const handleSave = () => {
                if (!form.prNo) return showAlert("กรุณาระบุ PR No. (เลขที่เอกสาร)", "ข้อมูลไม่ครบถ้วน");
                if (form.items.length === 0) return showAlert("กรุณาเลือกพัสดุอย่างน้อย 1 รายการ", "ข้อมูลไม่ครบถ้วน");
                const cleanedItems = form.items.filter(it => toSafeNumber(it.qty, 0) > 0).map(it => ({ ...it, qty: toSafeNumber(it.qty, 0) }));
                if (cleanedItems.length === 0) return showAlert("กรุณาระบุจำนวนสั่งซื้อที่มากกว่า 0 อย่างน้อย 1 รายการ", "ข้อมูลไม่ครบถ้วน");
                if ((!editingPlan || cleanString(editingPlan.prNo) !== cleanString(form.prNo)) && plans.some(p => cleanString(p.prNo) === cleanString(form.prNo))) {
                    return showAlert("PR No. นี้มีอยู่แล้ว กรุณาใช้เลขใหม่หรือแก้ไขใบเดิม", "เลขที่เอกสารซ้ำ");

                const isEdit = !!editingPlan;
                const planId = isEdit ? editingPlan.id : `PLAN-${Date.now()}`;
                const newPlan = { ...form, items: cleanedItems, id: planId };

                let newMaster = [...masterData];
                if (isEdit) {
                    editingPlan.items.forEach(oldItem => {

                        if (mIdx > -1 && newMaster[mIdx].ordered) {
                            newMaster[mIdx].ordered = newMaster[mIdx].ordered.filter(x => x.planId !== editingPlan.id);

                                        <tbody className="divide-y">
                                            {form.items.map((it,i)=>(
                                                <tr key={i} className="hover:bg-slate-50">
                                                    <td className="p-3 text-center font-black text-slate-500">{i + 1}</td>
                                                    <td className="p-3"><div className="font-bold text-slate-800">{it.name} <span className="text-slate-400 text-xs font-normal">({it.spec})</span></div><div className="text-xs text-slate-400 font-mono mt-0.5">{it.code}</div></td>
                                                    <td className="p-2"><input type="number" min="0.01" step="0.01" className="w-full border text-center rounded p-1.5 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-blue-700 bg-blue-50" value={it.qty} onChange={e=>updateQty(i,e.target.value)}/></td>
                                                    <td className="p-2 text-center"><button onClick={()=>removeItem(i)} className="text-red-400 hover:text-red-600 p-1 bg-red-50 hover:bg-red-100 rounded transition-colors"><Icons.Trash2 size={16}/></button></td>
                                                </tr>
                                            ))}

                        </div>
                        <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                            <button onClick={() => { setIsPlanning(false); setEditingPlan(null); }} className="px-6 py-2.5 text-slate-500 hover:text-slate-700 hover:bg-slate-200/60 rounded-xl font-bold transition-all">ยกเลิก</button>
                            <button onClick={handleSave} className="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white px-8 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-600/15 hover:shadow-indigo-600/20 transition-all hover:scale-[1.02] active:scale-[0.98] flex gap-2 items-center"><Icons.Save size={18}/> บันทึกแผนสั่งซื้อ</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- VIEWS ---
        const MasterDataViewWrapper = ({ masterData, setMasterData, categoryList, setCategoryList, unitList, setUnitList, showAlert, showConfirm }) => {
            const [form, setForm] = useState({ code: '', name: '', brand: '', spec: '', unit: unitList?.[0]?.name || 'Pcs', category: categoryList?.[0]?.name || 'General', boq: '' });
            const [codeSearch, setCodeSearch] = useState('');
            const [nameSearch, setNameSearch] = useState('');
            const [nameFilter, setNameFilter] = useState('');
            const [specSearch, setSpecSearch] = useState('');
            const [specFilter, setSpecFilter] = useState('');
            const [categorySearch, setCategorySearch] = useState('');
            const [categoryFilter, setCategoryFilter] = useState('');
            const [isEdit, setIsEdit] = useState(false);
            const [editId, setEditId] = useState(null);
            const [editFormData, setEditFormData] = useState({});
            
            useEffect(() => {
                if (categoryList && categoryList.length > 0 && (!form.category || !categoryList.find(c => c.name === form.category))) {
                    setForm(prev => ({ ...prev, category: categoryList[0].name }));
                }
                if (unitList && unitList.length > 0 && (!form.unit || !unitList.find(u => u.name === form.unit))) {
                    setForm(prev => ({ ...prev, unit: unitList[0].name }));
                }
            }, [categoryList, unitList]);
            
            const saveItem = () => {
                const notify = showAlert || window.alert;
                if (!form.name) return notify("กรุณาระบุชื่อพัสดุ", "ข้อมูลไม่ครบถ้วน");
                const duplicateKey = makeMasterDuplicateKey(form);
                const duplicateItem = masterData.find(m => m.id !== editId && makeMasterDuplicateKey(m) === duplicateKey);
                if (duplicateItem) return notify("พบข้อมูลซ้ำใน Master Data ตามเงื่อนไข หมวด + ชื่อ + ขนาด + หน่วย ระบบจะไม่เพิ่มรายการซ้ำ", "รายการซ้ำ");
                if (trimOrEmpty(form.code) && masterData.some(m => m.id !== editId && cleanString(m.code) === cleanString(form.code))) return notify("รหัสพัสดุซ้ำ กรุณาเปลี่ยนรหัสก่อนบันทึก", "รหัสซ้ำ");
                let code = trimOrEmpty(form.code);
                const catList = categoryList || [];
                if(!code) {
                    const catObj = catList.find(c => c.name === form.category);
                    const abbr = catObj ? catObj.abbr : 'GN';
                    code = generateNextCode(masterData, [], abbr);
                }
                const item = { ...form, code, id: isEdit ? editId : generateId(), boq: Number(form.boq)||0, ordered:[], received:[], disbursed:[] };
                if(isEdit) { 
                    setMasterData(prev=>prev.map(m=>m.id===editId?{...m, ...item, ordered:m.ordered, received:m.received, disbursed:m.disbursed}:m)); 
                    setIsEdit(false); setEditId(null); 
                    notify("อัปเดตข้อมูลสำเร็จ", "สำเร็จ");
                } else { 
                    setMasterData(prev=>[...prev, item]); 
                    notify("เพิ่มรายการพัสดุใหม่สำเร็จ", "สำเร็จ");
                }
                setForm({ code:'', name:'', brand:'', spec:'', unit: unitList?.[0]?.name || 'Pcs', category: categoryList?.[0]?.name || 'General', boq:'' });
            };

            const editItem = (m) => { setForm(m); setIsEdit(true); setEditId(m.id); setEditFormData({...m}); };
            const cancelEdit = () => { setIsEdit(false); setEditId(null); setEditFormData({}); };
            const saveEdit = () => { const notify = showAlert || window.alert; const duplicateKey = makeMasterDuplicateKey(editFormData); if (masterData.some(m => m.id !== editId && makeMasterDuplicateKey(m) === duplicateKey)) return notify("พบข้อมูลซ้ำใน Master Data", "รายการซ้ำ"); if (trimOrEmpty(editFormData.code) && masterData.some(m => m.id !== editId && cleanString(m.code) === cleanString(editFormData.code))) return notify("รหัสพัสดุซ้ำ กรุณาเปลี่ยนรหัสก่อนบันทึก", "รหัสซ้ำ"); setMasterData(prev => prev.map(m => m.id === editId ? { ...m, ...editFormData, code: trimOrEmpty(editFormData.code), boq: Number(editFormData.boq) || 0 } : m)); cancelEdit(); notify("อัปเดตข้อมูลสำเร็จ", "สำเร็จ"); };
            const deleteItem = (id) => { 
                if (showConfirm) { showConfirm("ต้องการลบรายการพัสดุนี้ใช่หรือไม่?", () => setMasterData(prev=>prev.filter(m=>m.id!==id))); } 
                else { if(window.confirm("ต้องการลบรายการพัสดุนี้ใช่หรือไม่?")) setMasterData(prev=>prev.filter(m=>m.id!==id)); }
            };
            
            const handleImport = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const notify = showAlert || window.alert;
                const reader = new FileReader();
                reader.onload = (evt) => {
                        if(window.XLSX) {
                            const wb = window.XLSX.read(evt.target.result, {type:'binary'});
                            let countNew = 0; let countSkipped = 0;
                            let newM = [...masterData]; let tempCodes = [];
                            let existingCat = new Set((categoryList||[]).map(c=>c.name)); 
                            let existingUnit = new Set((unitList||[]).map(u=>u.name));
                            let newCats = []; let newUnits = [];
                            
                            wb.SheetNames.forEach(sheetName => {
                                const data = window.XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: "" });
                                let catName = sheetName;
                                let sheetAbbr = (catName.substring(0, 2).toUpperCase() || 'GN').replace(/[^A-Za-z0-9_-]/g, '');
                                let existingCatObj = (categoryList||[]).find(c => safeLower(c.name) === safeLower(catName)) || newCats.find(c => safeLower(c.name) === safeLower(catName));
                                
                                if (existingCatObj) { sheetAbbr = existingCatObj.abbr; } 
                                else { existingCat.add(catName); newCats.push({id: `CAT-${Date.now()}-${Math.random()}`, name: catName, abbr: sheetAbbr}); }

                                data.forEach(row => {
                                    const keys = Object.keys(row).reduce((acc, k) => { acc[k.trim().toLowerCase()] = row[k]; return acc; }, {});
                                    const name = keys['name'] || keys['definition name'] || keys['description'] || keys['ชื่อ'] || keys['รายการ'];
                                    
                                    if(!name || String(name).trim() === '') return;

                                    let code = keys['code'] || keys['item code'] || keys['รหัส'];
                                    let brand = keys['brand'] || keys['manufacturer'] || keys['ยี่ห้อ'] || '';
                                    let spec = keys['spec/size'] || keys['spec'] || keys['specification'] || keys['ขนาด'] || '-';
                                    let unit = keys['unit'] || keys['uom'] || keys['หน่วย'] || 'Pcs';
                                    let boq = Number(keys['boq'] || keys['quantity'] || keys['จำนวน'] || 0);

                                    const duplicateKey = makeMasterDuplicateKey({ category: catName, name, spec, unit });
                                    const existingIdx = newM.findIndex(m => makeMasterDuplicateKey(m) === duplicateKey);
                                    
                                    if(existingIdx > -1) { countSkipped++; } 
                                    else {
                                        if (!code) { code = generateNextCode(newM, tempCodes, sheetAbbr); tempCodes.push(code); }
                                        if(!existingUnit.has(unit)){ existingUnit.add(unit); newUnits.push({id: `UNIT-${Date.now()}-${Math.random()}`, name: unit}); }
                                        newM.push({ id: generateId(), code, name, brand, spec, unit, category: catName, boq, ordered: [], received: [], disbursed: [] });
                                        countNew++;
                                    }
                                });
                            });
                            setMasterData(newM);
                            if(newCats.length > 0) setCategoryList(prev => [...(prev||[]), ...newCats]);
                            if(newUnits.length > 0) setUnitList(prev => [...(prev||[]), ...newUnits]);
                            notify(`นำเข้ารายการใหม่สำเร็จ ${countNew} รายการ\n(ข้ามรายการซ้ำ ${countSkipped} รายการ)`, "นำเข้าข้อมูลสำเร็จ");
                            e.target.value = null;
                        } else { notify("Excel Library is loading... please wait.", "ยังไม่พร้อมใช้งาน"); loadXLSX(); }
                };
                reader.readAsBinaryString(file);
            };

            const downloadTemplate = () => {
                 if (window.XLSX) {
                     const wb = window.XLSX.utils.book_new(); 
                     const ws1 = window.XLSX.utils.aoa_to_sheet([["Code", "Name", "Spec/Size", "Brand", "Unit", "BOQ"], ["", "เหล็กเส้นกลม SR24", "RB6 mm", "Tata", "เส้น", 1000]]);
                     window.XLSX.utils.book_append_sheet(wb, ws1, "Structure");
                     const ws2 = window.XLSX.utils.aoa_to_sheet([["Code", "Name", "Spec/Size", "Brand", "Unit", "BOQ"], ["", "สีน้ำอะคริลิค", "ถัง 18L", "TOA", "ถัง", 50]]);
                     window.XLSX.utils.book_append_sheet(wb, ws2, "Architect");
                     window.XLSX.writeFile(wb, "Master_Template_MultiSheet.xlsx");
                 } else { 
                    const notify = showAlert || window.alert;
                    notify("Excel Library is loading... please wait.", "ยังไม่พร้อมใช้งาน"); loadXLSX(); 
                 }
            };
            
            const handleExport = () => {
                const exportData = masterData.map(m=>({Code:m.code, Name:m.name, "Spec/Size":m.spec, Brand:m.brand, Unit:m.unit, Category:m.category, BOQ:m.boq}));
                exportToExcel(exportData, "MasterData_Export", "MasterData");
            };

            const uniqueNameOptions = [...new Set(masterData.map(m => trimOrEmpty(m.name)).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'th'));
            const uniqueSpecOptions = [...new Set(masterData.map(m => trimOrEmpty(m.spec)).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'th', { numeric: true }));
            const uniqueCategoryOptions = [...new Set(masterData.map(m => trimOrEmpty(m.category)).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'th'));
            const mergeSelectedOption = (options, selected) => (selected && !options.includes(selected) ? [selected, ...options] : options);
            const filteredNameOptions = mergeSelectedOption(uniqueNameOptions.filter(opt => safeLower(opt).includes(safeLower(nameSearch))), nameFilter);
            const filteredSpecOptions = mergeSelectedOption(uniqueSpecOptions.filter(opt => safeLower(opt).includes(safeLower(specSearch))), specFilter);
            const filteredCategoryOptions = mergeSelectedOption(uniqueCategoryOptions.filter(opt => safeLower(opt).includes(safeLower(categorySearch))), categoryFilter);

            const filteredData = sortMasterData(masterData.filter(m => {
                const codeTerm = safeLower(codeSearch);
                const nameTerm = safeLower(nameSearch);
                const specTerm = safeLower(specSearch);
                const categoryTerm = safeLower(categorySearch);

                const matchesCode = !codeTerm || safeLower(m.code).includes(codeTerm);
                const matchesName = nameFilter
                    ? safeLower(m.name) === safeLower(nameFilter)
                    : (!nameTerm || safeLower(m.name).includes(nameTerm));
                const matchesSpec = specFilter
                    ? safeLower(m.spec) === safeLower(specFilter)
                    : (!specTerm || safeLower(m.spec).includes(specTerm));
                const matchesCategory = categoryFilter
                    ? safeLower(m.category) === safeLower(categoryFilter)
                    : (!categoryTerm || safeLower(m.category).includes(categoryTerm));

                return matchesCode && matchesName && matchesSpec && matchesCategory;
            }));

            return (
                <div className="space-y-6 animate-in fade-in">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h3 className="font-bold text-lg mb-4 text-purple-700">📦 Master Data Management</h3>
                        <div className="grid grid-cols-1 md:grid-cols-7 gap-3 mb-4 items-end">
                            <div className="md:col-span-2">
                                <label className="text-[10px] uppercase font-bold text-slate-500">Name (ชื่อ)</label>
                                <input className="w-full border p-2 rounded text-sm" placeholder="Name" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} />
                            </div>

        const TrackingView = ({ masterData, categoryList, setActiveView }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [searchField, setSearchField] = useState('all');

            const activeItems = (masterData||[]).filter(isItemActive);
            
            // ล็อคจำนวนคอลัมน์ให้ตายตัว ไม่ให้ตารางยืดขยายเกินไป
            const MAX_P = 6;
            const MAX_R = 6;
            const MAX_D = 10;
            const pCols = Array.from({length:MAX_P},(_,i)=>i+1);
            const rCols = Array.from({length:MAX_R},(_,i)=>i+1);
            const dCols = Array.from({length:MAX_D},(_,i)=>i+1);
            
            const filtered = sortMasterData(activeItems.filter(item => {
                if (filterCategory !== 'ALL' && item.category !== filterCategory) return false;
                const term = safeLower(searchTerm);
                if (!term) return true;
                if (searchField === 'all') return safeLower(item.name).includes(term) || safeLower(item.code).includes(term) || safeLower(item.spec).includes(term) || safeLower(item.category).includes(term);
                return safeLower(item[searchField]).includes(term);
            }));
            
            const handleExport = () => {
                if (!window.XLSX) {
                    alert("Excel Library is loading... Please wait.");
                    loadXLSX();
                    return;
                }

                const wb = window.XLSX.utils.book_new();

                // --- 1. TRACKING BOARD SHEET (แก้ไขให้ Export ตรงตามหน้าจอระบบเป๊ะๆ แยก 3 บรรทัด) ---
                const wsTrackingData = [];
                const head1 = ["Code", "Name", "Brand", "Spec", "Unit", "Cat", "BOQ"];
                let merges = [];
                
                head1.push("Planning Ordered");
                for(let i=0; i<MAX_P+1; i++) head1.push(""); 
                
                head1.push("Received Record");
                for(let i=0; i<MAX_R; i++) head1.push("");

                head1.push("Disbursed Record");
                for(let i=0; i<MAX_D; i++) head1.push("");
                
                head1.push("Balance");
                wsTrackingData.push(head1);

                const head2 = ["Code", "Name", "Brand", "Spec", "Unit", "Cat", "BOQ"];
                for(let i=1; i<=MAX_P; i++) head2.push(`#${i}`);
                head2.push("Total", "Plan.Bal");
                for(let i=1; i<=MAX_R; i++) head2.push(`#${i}`);
                head2.push("Total");
                for(let i=1; i<=MAX_D; i++) head2.push(`#${i}`);
                head2.push("Total", "Final Bal");
                wsTrackingData.push(head2);

                let cIdx = 7;
                merges.push({s:{r:0, c:cIdx}, e:{r:0, c:cIdx+MAX_P+1}}); // Planning Ordered Header
                cIdx += MAX_P+2;
                merges.push({s:{r:0, c:cIdx}, e:{r:0, c:cIdx+MAX_R}}); // Received Record Header
                cIdx += MAX_R+1;
                merges.push({s:{r:0, c:cIdx}, e:{r:0, c:cIdx+MAX_D}}); // Disbursed Record Header

                // ผสานส่วนหัวคอลัมน์แนวตั้ง
                for (let c=0; c<=6; c++) merges.push({s:{r:0, c:c}, e:{r:1, c:c}});
                merges.push({s:{r:0, c: 7+MAX_P+2 + MAX_R+1 + MAX_D+1}, e:{r:1, c: 7+MAX_P+2 + MAX_R+1 + MAX_D+1}});

                let currentRowIdx = 2; // ข้อมูลเริ่มต้นที่แถว index 2 ของ Excel

                filtered.forEach(m => {
                    const totalP = sumArrayQty(m.ordered); 
                    const totalR = sumArrayQty(m.received); 
                    const totalD = sumArrayQty(m.disbursed);
                    
                    const oLen = m.ordered?.length || 0;
                    const rLen = m.received?.length || 0;
                    const dLen = m.disbursed?.length || 0;
                    
                    // คำนวณว่าพัสดุชิ้นนี้ต้องใช้กี่ชุด (ชุดละ 3 บรรทัด: จำนวน, เลขเอกสาร, วันที่)
                    const rowCount = Math.max(1, Math.ceil(oLen/MAX_P), Math.ceil(rLen/MAX_R), Math.ceil(dLen/MAX_D));
                    const totalExcelRows = rowCount * 3;

                    // ผสานเซลล์ข้อมูลพื้นฐานและยอดรวมให้เป็นช่องเดียว คลุมทั้งหมด
                    for (let c=0; c<=6; c++) merges.push({ s: {r: currentRowIdx, c: c}, e: {r: currentRowIdx + totalExcelRows - 1, c: c} }); 
                    
                    let pBalIdx = 7 + MAX_P;
                    merges.push({ s: {r: currentRowIdx, c: pBalIdx}, e: {r: currentRowIdx + totalExcelRows - 1, c: pBalIdx} }); // PTotal
                    merges.push({ s: {r: currentRowIdx, c: pBalIdx+1}, e: {r: currentRowIdx + totalExcelRows - 1, c: pBalIdx+1} }); // PBal
                    
                    let rTotalIdx = pBalIdx + 2 + MAX_R;
                    merges.push({ s: {r: currentRowIdx, c: rTotalIdx}, e: {r: currentRowIdx + totalExcelRows - 1, c: rTotalIdx} }); // RTotal

                    let dTotalIdx = rTotalIdx + 1 + MAX_D;
                    merges.push({ s: {r: currentRowIdx, c: dTotalIdx}, e: {r: currentRowIdx + totalExcelRows - 1, c: dTotalIdx} }); // DTotal
                    merges.push({ s: {r: currentRowIdx, c: dTotalIdx+1}, e: {r: currentRowIdx + totalExcelRows - 1, c: dTotalIdx+1} }); // FinalBal

                    for(let rIdx = 0; rIdx < rowCount; rIdx++) {
                        let rowQty = [];
                        let rowDoc = [];
                        let rowDate = [];

                        if(rIdx === 0) {
                            rowQty.push(m.code, m.name, m.brand||'-', m.spec||'-', m.unit, m.category, m.boq);
                            rowDoc.push("", "", "", "", "", "", "");
                            rowDate.push("", "", "", "", "", "", "");
                        } else {
                            rowQty.push("", "", "", "", "", "", "");
                            rowDoc.push("", "", "", "", "", "", "");
                            rowDate.push("", "", "", "", "", "", "");
                        }

                        // Planning Ordered
                        for(let i=0; i<MAX_P; i++) {
                            const o = m.ordered && m.ordered[rIdx * MAX_P + i];
                            rowQty.push(o && o.qty ? Number(o.qty) : '');
                            rowDoc.push(o && o.qty ? (o.prNo||'-') : '');
                            rowDate.push(o && o.qty ? formatDate(o.date) : '');
                        }
                        if(rIdx === 0) { rowQty.push(totalP, (m.boq||0) - totalP); rowDoc.push("",""); rowDate.push("",""); } 
                        else { rowQty.push("",""); rowDoc.push("",""); rowDate.push("",""); }

                        // Received Record
                        for(let i=0; i<MAX_R; i++) {
                            const r = m.received && m.received[rIdx * MAX_R + i];
                            rowQty.push(r && r.qty ? Number(r.qty) : '');
                            rowDoc.push(r && r.qty ? (r.deliveryNo||'-') : '');
                            rowDate.push(r && r.qty ? formatDate(r.date) : '');
                        }
                        if(rIdx === 0) { rowQty.push(totalR); rowDoc.push(""); rowDate.push(""); } 
                        else { rowQty.push(""); rowDoc.push(""); rowDate.push(""); }

                        // Disbursed Record
                        for(let i=0; i<MAX_D; i++) {
                            const d = m.disbursed && m.disbursed[rIdx * MAX_D + i];
                            rowQty.push(d && d.qty ? Number(d.qty) : '');
                            rowDoc.push(d && d.qty ? `${d.reqNo||'-'} ${d.company ? `(${d.company})` : ''}` : '');
                            rowDate.push(d && d.qty ? formatDate(d.date) : '');
                        }
                        if(rIdx === 0) { rowQty.push(totalD, totalR - totalD); rowDoc.push("",""); rowDate.push("",""); } 
                        else { rowQty.push("",""); rowDoc.push("",""); rowDate.push("",""); }

                        // เติม 3 บรรทัดนี้ลงใน Excel
                        wsTrackingData.push(rowQty, rowDoc, rowDate);
                        currentRowIdx += 3;
                    }
                });

                const wsTracking = window.XLSX.utils.aoa_to_sheet(wsTrackingData);
                wsTracking['!merges'] = merges;
                window.XLSX.utils.book_append_sheet(wb, wsTracking, "Tracking Board");

                // --- 2. STOCK CARD SHEET ---
                const wsLedgerData = [];
                filtered.forEach(m => {
                    wsLedgerData.push([`Material Code : ${m.code}`, `Material : ${m.name} ${m.spec !== '-' ? m.spec : ''}`, `Brand : ${m.brand||'-'}`, `Unit : ${m.unit}`]);
                    wsLedgerData.push(["IC Date", "Description/Supplier", "Doc. No.", "Ref Doc.", "Receipt Qty", "Issue Qty", "Balance Qty"]);
                    
                    let runningBal = 0;
                    let totalRec = 0;
                    let totalIss = 0;

                    let txns = [];
                    (m.received || []).forEach(r => {
                        txns.push({ date: r.date, desc: r.vendor, docNo: r.receiptId || '-', ref: r.deliveryNo || r.prNo || '-', recQty: Number(r.qty), issQty: 0, timestamp: r.timestamp || 0 });
                    });
                    (m.disbursed || []).forEach(d => {
                        txns.push({ date: d.date, desc: d.company || d.from || 'Issue', docNo: d.reqNo, ref: d.work || '-', recQty: 0, issQty: Number(d.qty), timestamp: d.timestamp || 0 });
                    });

                    txns.sort((a,b) => {
                        const dateComp = String(a.date).localeCompare(String(b.date));
                        if (dateComp !== 0) return dateComp;
                        const tA = a.timestamp || 0;
                        const tB = b.timestamp || 0;
                        if (tA !== tB) return tA - tB;
                        if (a.recQty > 0 && b.issQty > 0) return -1;
                        if (a.issQty > 0 && b.recQty > 0) return 1;
                        return 0;
                    });

                    txns.forEach(t => {
                        runningBal += t.recQty;
                        runningBal -= t.issQty;
                        totalRec += t.recQty;
                        totalIss += t.issQty;
                        wsLedgerData.push([
                            formatDate(t.date), t.desc, t.docNo, t.ref, 
                            t.recQty ? t.recQty.toFixed(2) : '', 
                            t.issQty ? t.issQty.toFixed(2) : '', 
                            runningBal.toFixed(2)
                        ]);
                    });

                    wsLedgerData.push(["", "", "", "Total Material Code : " + m.code, totalRec > 0 ? totalRec.toFixed(2) : '0.00', totalIss > 0 ? totalIss.toFixed(2) : '0.00', runningBal.toFixed(2)]);
                    wsLedgerData.push([]); 
                    wsLedgerData.push([]); 
                });

                const wsLedger = window.XLSX.utils.aoa_to_sheet(wsLedgerData);
                wsLedger['!cols'] = [ {wch: 12}, {wch: 35}, {wch: 18}, {wch: 15}, {wch: 12}, {wch: 12}, {wch: 12} ];
                window.XLSX.utils.book_append_sheet(wb, wsLedger, "Stock Card");

                window.XLSX.writeFile(wb, "Tracking_And_StockCard.xlsx");
            };

            return (
                <div className="bg-white p-4 rounded-xl shadow border border-slate-200 animate-in fade-in">

                                {rCols.map(i=> <th key={`r-${i}`} className="sticky top-[40px] z-20 p-0.5 border-r bg-orange-50 w-[85px] min-w-[85px] max-w-[85px] overflow-hidden leading-tight shadow-sm">#{i}</th>)}<th className="sticky top-[40px] z-20 p-2 bg-orange-100 border-r shadow-sm">Total</th>
                                {dCols.map(i=> <th key={`d-${i}`} className="sticky top-[40px] z-20 p-0.5 border-r bg-green-50 w-[85px] min-w-[85px] max-w-[85px] overflow-hidden leading-tight shadow-sm">#{i}</th>)}<th className="sticky top-[40px] z-20 p-2 bg-green-100 border-r shadow-sm">Total</th><th className="sticky top-[40px] z-20 p-2 bg-emerald-100 border-r shadow-sm">Final Bal</th>

                        <tbody>

        const ReceivingView = ({ vendors, masterData, setMasterData, receipts, setReceipts, categoryList, setIsReceiving, setEditingReceipt, plans, showConfirm, showAlert }) => {

        const StockCardView = ({ masterData, categoryList }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategory, setFilterCategory] = useState('ALL');
            const [filterSupplier, setFilterSupplier] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            const activeItems = masterData.filter(m => (m.received && m.received.length > 0) || (m.disbursed && m.disbursed.length > 0));
            
            const filtered = sortMasterData(activeItems.filter(item => {
                if (filterCategory !== 'ALL' && item.category !== filterCategory) return false;
                const term = safeLower(searchTerm);
                if (!term) return true;
                return safeLower(item.name).includes(term) || safeLower(item.code).includes(term) || safeLower(item.spec).includes(term);
            }));

            const sortTransactions = (txns) => {
                return txns.sort((a, b) => {
                    const dateComp = String(a.date).localeCompare(String(b.date));
                    if (dateComp !== 0) return dateComp;
                    const tA = a.timestamp || 0;
                    const tB = b.timestamp || 0;
                    if (tA !== tB) return tA - tB;
                    if (a.recQty > 0 && b.issQty > 0) return -1;
                    if (a.issQty > 0 && b.recQty > 0) return 1;
                    return 0;
                });
