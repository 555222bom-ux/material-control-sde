            const handleExport = () => {
                if (!window.XLSX) { alert("Excel Library is loading... Please wait."); loadXLSX(); return; }

                const wb = window.XLSX.utils.book_new();
                const wsData = [];
                
                filtered.forEach(m => {
                    let bfQty = 0;
                    let totalRec = 0;
                    let totalIss = 0;

                    let txns = [];
                    (m.received || []).forEach(r => txns.push({ date: r.date, desc: r.vendor, docNo: r.receiptId || '-', ref: r.deliveryNo || r.prNo || '-', recQty: Number(r.qty), issQty: 0, timestamp: r.timestamp || 0 }));
                    (m.disbursed || []).forEach(d => txns.push({ date: d.date, desc: d.company || d.from || 'Issue', docNo: d.reqNo, ref: d.work || '-', recQty: 0, issQty: Number(d.qty), timestamp: d.timestamp || 0 }));

                    sortTransactions(txns);

                    let currentBal = 0;
                    let displayTxns = [];

                    txns.forEach(t => {
                        currentBal += t.recQty;
                        currentBal -= t.issQty;

                        let inDateRange = true;
                        if (startDate && t.date < startDate) {
                            inDateRange = false;
                            bfQty += t.recQty;
                            bfQty -= t.issQty;
                        }
                        if (endDate && t.date > endDate) { inDateRange = false; }

                        let matchSupplier = true;
                        if (filterSupplier && !safeLower(t.desc).includes(safeLower(filterSupplier))) { matchSupplier = false; }

                        if (inDateRange && matchSupplier) {
                            totalRec += t.recQty;
                            totalIss += t.issQty;
                            displayTxns.push({ ...t, runningBal: currentBal });
                        }
                    });

                    if (displayTxns.length === 0 && !startDate) return;

                    wsData.push([`Material Code : ${m.code}`, `Material : ${m.name} ${m.spec !== '-' ? m.spec : ''}`, `Brand : ${m.brand||'-'}`, `Unit : ${m.unit}`]);
                    wsData.push(["IC Date", "Description/Supplier", "Doc. No.", "Ref Doc.", "Receipt Qty", "Issue Qty", "Balance Qty"]);
                    
                    if (startDate && !filterSupplier) {
                        wsData.push([formatDate(startDate), "Brought Forward (ยอดยกมา)", "-", "-", "", "", bfQty.toFixed(2)]);
                    }

                    displayTxns.forEach(t => {
                        wsData.push([formatDate(t.date), t.desc, t.docNo, t.ref, t.recQty ? t.recQty.toFixed(2) : '', t.issQty ? t.issQty.toFixed(2) : '', t.runningBal.toFixed(2)]);
                    });

                    const finalBalance = displayTxns.length > 0 ? displayTxns[displayTxns.length - 1].runningBal : bfQty;
                    wsData.push(["", "", "", "Total Material Code : " + m.code, totalRec > 0 ? totalRec.toFixed(2) : '0.00', totalIss > 0 ? totalIss.toFixed(2) : '0.00', finalBalance.toFixed(2)]);
                    wsData.push([]); 
                    wsData.push([]); 
                });

                if (wsData.length === 0) { alert("ไม่มีข้อมูลที่จะส่งออก (อาจเพราะเงื่อนไขการกรองไม่มีข้อมูลตรงกัน)"); return; }

                const ws = window.XLSX.utils.aoa_to_sheet(wsData);
                ws['!cols'] = [ {wch: 12}, {wch: 35}, {wch: 18}, {wch: 15}, {wch: 12}, {wch: 12}, {wch: 12} ];
                window.XLSX.utils.book_append_sheet(wb, ws, "Stock Card");
                window.XLSX.writeFile(wb, "StockCard_Ledger.xlsx");
            };

            return (
                <div className="space-y-6 animate-in fade-in">
                    <div className="bg-white p-6 rounded-xl shadow border-t-4 border-indigo-500">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <h3 className="font-bold flex items-center gap-2 text-indigo-700 whitespace-nowrap text-xl"><Icons.Book size={24}/> Stock Card (Material Ledger)</h3>
                            <button onClick={handleExport} className="bg-indigo-50 text-indigo-700 border border-indigo-200 px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-100 transition-colors whitespace-nowrap flex items-center gap-2"><Icons.Download size={16}/> Export Excel</button>
                        </div>

                        <div className="flex flex-wrap gap-3 mb-6 bg-slate-50 p-4 rounded-lg border border-slate-200 items-end">
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Category (หมวดหมู่)</label>

                                    <option value="ALL">ทั้งหมด (All Categories)</option>
                                    {(categoryList||[]).map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">From Date (ตั้งแต่)</label>
                                <input type="date" className="border border-slate-300 p-2 rounded-lg text-sm bg-white outline-none focus:ring-2 focus:ring-indigo-500" value={startDate} onChange={e=>setStartDate(e.target.value)} />
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">To Date (ถึง)</label>
                                <input type="date" className="border border-slate-300 p-2 rounded-lg text-sm bg-white outline-none focus:ring-2 focus:ring-indigo-500" value={endDate} onChange={e=>setEndDate(e.target.value)} />
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Supplier / Desc</label>
                                <input type="text" className="border border-slate-300 p-2 rounded-lg text-sm bg-white outline-none focus:ring-2 focus:ring-indigo-500 min-w-[180px]" placeholder="ค้นหาชื่อ..." value={filterSupplier} onChange={e=>setFilterSupplier(e.target.value)} />
                            </div>
                            <div className="flex-1 flex items-end">
                                <div className="relative w-full md:w-64 ml-auto">
                                    <input className="w-full border border-slate-300 p-2 pl-9 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Search Code, Name..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                                    <Icons.Search className="absolute left-3 top-2.5 text-slate-400 w-4 h-4" />
                                </div>
                            </div>
                        </div>
                        
                        <div className="space-y-8">
                            {filtered.map(m => {
                                let bfQty = 0;
                                let totalRec = 0;
                                let totalIss = 0;

                                let txns = [];
                                (m.received || []).forEach(r => txns.push({ date: r.date, desc: r.vendor, docNo: r.receiptId || '-', ref: r.deliveryNo || r.prNo || '-', recQty: Number(r.qty), issQty: 0, timestamp: r.timestamp || 0 }));
                                (m.disbursed || []).forEach(d => txns.push({ date: d.date, desc: d.company || d.from || 'Issue', docNo: d.reqNo, ref: d.work || '-', recQty: 0, issQty: Number(d.qty), timestamp: d.timestamp || 0 }));
                                
                                sortTransactions(txns);

                                let currentBal = 0;
                                let displayTxns = [];

                                txns.forEach(t => {
                                    currentBal += t.recQty;
                                    currentBal -= t.issQty;

                                    let inDateRange = true;
                                    if (startDate && t.date < startDate) {
                                        inDateRange = false;
                                        bfQty += t.recQty;
                                        bfQty -= t.issQty;
                                    }
                                    if (endDate && t.date > endDate) {
                                        inDateRange = false;
                                    }

                                    let matchSupplier = true;
                                    if (filterSupplier && !safeLower(t.desc).includes(safeLower(filterSupplier))) {
                                        matchSupplier = false;
                                    }

                                    if (inDateRange && matchSupplier) {
                                        totalRec += t.recQty;
                                        totalIss += t.issQty;
                                        displayTxns.push({ ...t, runningBal: currentBal });

                                if (displayTxns.length === 0 && (filterSupplier || (startDate && endDate))) return null;

                                return (
                                    <div key={m.code} className="border border-slate-300 rounded-lg overflow-hidden bg-white shadow-sm">

                                            <div className="font-bold text-slate-800">Brand : <span className="font-medium text-slate-700">{m.brand || '-'}</span></div>
                                            <div className="font-bold text-slate-800">Unit : <span className="font-medium text-slate-700">{m.unit}</span></div>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-xs text-left">
                                                <thead className="border-b border-slate-200 bg-white">
                                                    <tr className="text-slate-600">
                                                        <th className="p-3 w-28 whitespace-nowrap">IC Date</th>
                                                        <th className="p-3 min-w-[200px]">Description/Supplier</th>
                                                        <th className="p-3 w-32 whitespace-nowrap">Doc. No.</th>
                                                        <th className="p-3 w-32 whitespace-nowrap">Ref Doc.</th>
                                                        <th className="p-3 w-24 text-right whitespace-nowrap">Receipt Qty</th>
                                                        <th className="p-3 w-24 text-right whitespace-nowrap">Issue Qty</th>
                                                        <th className="p-3 w-24 text-right font-bold whitespace-nowrap">Balance Qty</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {startDate && !filterSupplier && (
                                                        <tr className="bg-amber-50/50">
                                                            <td className="p-3 font-medium text-slate-600">{formatDate(startDate)}</td>
                                                            <td className="p-3 text-amber-800 font-bold">Brought Forward (ยอดยกมา)</td>
                                                            <td className="p-3 text-center text-slate-300">-</td>
                                                            <td className="p-3 text-center text-slate-300">-</td>
                                                            <td className="p-3 text-center text-slate-300">-</td>
                                                            <td className="p-3 text-center text-slate-300">-</td>
                                                            <td className="p-3 text-right font-bold text-amber-700">{bfQty.toFixed(2)}</td>
                                                        </tr>
                                                    )}
                                                    {displayTxns.map((t, idx) => {
                                                        return (
                                                            <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                                <td className="p-3 font-medium text-slate-600">{formatDate(t.date)}</td>
                                                                <td className="p-3 text-slate-800 max-w-[250px] truncate" title={t.desc}>
                                                                    {filterSupplier ? (
                                                                        <span dangerouslySetInnerHTML={{ __html: highlightText(t.desc, filterSupplier) }} />
                                                                    ) : t.desc}
                                                                </td>
                                                                <td className="p-3 font-mono text-[10px] text-slate-500">{t.docNo}</td>
                                                                <td className="p-3 font-mono text-[10px] text-slate-500">{t.ref}</td>
                                                                <td className="p-3 text-right font-medium text-green-600">{t.recQty ? t.recQty.toFixed(2) : ''}</td>
                                                                <td className="p-3 text-right font-medium text-red-600">{t.issQty ? t.issQty.toFixed(2) : ''}</td>
                                                                <td className="p-3 text-right font-bold text-slate-700 bg-slate-50/50">{t.runningBal.toFixed(2)}</td>
                                                            </tr>
                                                        )
                                                    })}
                                                    <tr className="border-t-2 border-slate-200 border-dashed bg-slate-50/80">
                                                        <td colSpan="4" className="p-3 text-right font-bold text-slate-700">Total Material Code : {m.code}</td>
                                                        <td className="p-3 text-right font-black text-green-700">{totalRec > 0 ? totalRec.toFixed(2) : '0.00'}</td>
                                                        <td className="p-3 text-right font-black text-red-700">{totalIss > 0 ? totalIss.toFixed(2) : '0.00'}</td>
                                                        <td className="p-3 text-right font-black text-indigo-700">{displayTxns.length > 0 ? displayTxns[displayTxns.length-1].runningBal.toFixed(2) : bfQty.toFixed(2)}</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )
                            })}
                            {filtered.length === 0 && <div className="text-center p-12 text-slate-500 bg-white rounded-xl border border-dashed border-slate-300 shadow-sm"><Icons.FileText size={48} className="mx-auto mb-4 text-slate-300"/>ไม่พบข้อมูลความเคลื่อนไหว (No Transactions Found)</div>}
                        </div>
                    </div>
                </div>
            );
        };

        const RequestSetupView = ({ reqConfig, setReqConfig, masterData, setMasterData, requests, setRequests, personnel, setPersonnel, companies, showAlert }) => {
            const [localConfig, setLocalConfig] = useState(reqConfig);
            const [manualForm, setManualForm] = useState(createEmptyManualRequestForm());
            const requestorOptions = getUniquePersonnelOptions(personnel, ROLE_REQUESTOR);
            const inspectorOptions = getUniquePersonnelOptions(personnel, ROLE_INSPECTOR);
            const approverOptions = getUniquePersonnelOptions(personnel, ROLE_APPROVER);
            const dispenserOptions = getUniquePersonnelOptions(personnel, ROLE_DISPENSER);
            const [mq, setMq] = useState('');
            const [searchField, setSearchField] = useState('all');
            const [showAll, setShowAll] = useState(false);

            const handleSaveConfig = () => { setReqConfig(localConfig); showAlert("บันทึกการตั้งค่าสำเร็จ", "สำเร็จ"); };
            
            const addManualItem = (m) => { 
                if (manualForm.items.find(i => i.code === m.code)) return showAlert("พัสดุนี้ถูกเลือกแล้ว", "รายการซ้ำ");
                setManualForm(prev => ({...prev, items: [...prev.items, {...m, qty: 1}]})); 
                setMq(''); 
                setShowAll(false); 
            };
            
            const updateManualQty = (idx, val) => {
                const n = [...manualForm.items];
                n[idx].qty = Number(val);
                setManualForm(prev => ({...prev, items: n}));
            };
            
            const saveManualRequest = () => {
                if(!manualForm.id) return showAlert("กรุณาระบุเลขที่ใบเบิก", "ข้อมูลไม่ครบถ้วน");
                if(!manualForm.company) return showAlert("กรุณาระบุบริษัทที่เบิก", "ข้อมูลไม่ครบถ้วน");
                if(manualForm.items.length === 0) return showAlert("กรุณาเลือกรายการเบิกอย่างน้อย 1 รายการ", "ข้อมูลไม่ครบถ้วน");
                const cleanedItems = manualForm.items.filter(it => toSafeNumber(it.qty, 0) > 0).map(it => ({ ...it, qty: toSafeNumber(it.qty, 0) }));
                if(cleanedItems.length === 0) return showAlert("กรุณาระบุจำนวนเบิกที่มากกว่า 0 อย่างน้อย 1 รายการ", "ข้อมูลไม่ครบถ้วน");
                if(requests.some(r => r.id === manualForm.id || r.sheetNo === manualForm.id)) return showAlert("เลขที่ใบเบิกนี้มีอยู่แล้ว", "เลขที่เอกสารซ้ำ");
                
                // Auto-add personnel if not exists
                if (manualForm.from) {
                    const nameStr = manualForm.from.trim();
                    const exists = (personnel||[]).find(p => safeLower(p.name) === safeLower(nameStr));
                    if (!exists && nameStr !== '') {
                        setPersonnel(prev => [...(prev||[]), { id: `P-${Date.now()}-${Math.random().toString(36).substr(2,5)}`, name: nameStr, role: 'ผู้เบิก (Requestor)' }]);
                    }
                }

                const newReq = { id: manualForm.id, sheetNo: manualForm.id, from: manualForm.from, checker: manualForm.checker, approver: manualForm.approver, dispenser: manualForm.dispenser, company: manualForm.company, work: manualForm.work, date: manualForm.date, status: 'Approved (Manual)', items: cleanedItems };
                setRequests(prev => [newReq, ...prev]);
                
                const newMaster = [...masterData];
                cleanedItems.forEach(item => {
                    const idx = newMaster.findIndex(m => m.code === item.code);
                    if(idx > -1) { 
                        if(!newMaster[idx].disbursed) newMaster[idx].disbursed = []; 
                        newMaster[idx].disbursed.push({ qty: Number(item.qty), date: manualForm.date, reqNo: manualForm.id, company: manualForm.company, from: manualForm.from, checker: manualForm.checker, approver: manualForm.approver, dispenser: manualForm.dispenser, work: manualForm.work, timestamp: Date.now() }); 
                    }
                });
                setMasterData(newMaster); 
                showAlert("บันทึกประวัติใบเบิกย้อนหลังเรียบร้อย", "สำเร็จ");
                setManualForm(createEmptyManualRequestForm());
            };

            const searchResults = sortMasterData(masterData.filter(m => {
                const term = safeLower(mq);
                if (!term) return showAll;
                if (searchField === 'all') return safeLower(m.name).includes(term) || safeLower(m.code).includes(term) || safeLower(m.spec).includes(term);
                return safeLower(m[searchField]).includes(term);
            }));

            return (
                <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in">
                    <div className="bg-white p-6 rounded-xl shadow border-l-4 border-purple-600">

                        </div>
                    </div>
                    
                    <div className="bg-white p-6 rounded-xl shadow border-l-4 border-slate-500">
                        <h3 className="font-bold flex items-center gap-2"><Icons.FileText size={18}/> Manual Request (บันทึกใบเบิกย้อนหลัง / อนุญาตติดลบ)</h3>
                        <div className="grid grid-cols-2 gap-4 mt-4">
                            <div><label className="text-xs font-bold text-slate-500 uppercase">Req No.</label><input className="w-full border p-2 rounded mt-1" placeholder="REQ-XXXX" value={manualForm.id} onChange={e=>setManualForm({...manualForm, id:e.target.value})}/></div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase">Date</label>
                                <DateInput value={manualForm.date} onChange={v => setManualForm({...manualForm, date: v})} className="mt-1" />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase">Company (บริษัทที่เบิก)</label>

                                    <option value="">Select Company</option>
                                    {(companies||[]).map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase">Requestor / Receiver</label>
                                <select className="w-full border p-2 rounded mt-1 bg-white focus:ring-2 focus:ring-slate-500 outline-none" value={manualForm.from || ''} onChange={e=>setManualForm({...manualForm, from:e.target.value})}>
                                    <option value="">-- เลือกผู้เบิก --</option>
                                    {requestorOptions.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase">Inspector (ผู้ตรวจ)</label>
                                <select className="w-full border p-2 rounded mt-1 bg-white" value={manualForm.checker || ''} onChange={e=>setManualForm({...manualForm, checker: e.target.value})}>
                                    <option value="">-- เลือกผู้ตรวจ --</option>
                                    {inspectorOptions.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase">Approver (ผู้อนุมัติ)</label>
                                <select className="w-full border p-2 rounded mt-1 bg-white" value={manualForm.approver || ''} onChange={e=>setManualForm({...manualForm, approver: e.target.value})}>
                                    <option value="">-- เลือกผู้อนุมัติ --</option>
                                    {approverOptions.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase">Dispenser (ผู้จ่าย)</label>
                                <select className="w-full border p-2 rounded mt-1 bg-white" value={manualForm.dispenser || ''} onChange={e=>setManualForm({...manualForm, dispenser: e.target.value})}>
                                    <option value="">-- เลือกผู้จ่าย --</option>
                                    {dispenserOptions.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                </select>
                            </div>
                            <div className="col-span-2">
                                <label className="text-xs font-bold text-slate-500 uppercase">Work / Location (จุดที่นำไปใช้งาน)</label>

                        </div>
                        
                        <div className="relative mt-4 flex gap-2">

                            {(mq || showAll) && (
                                <div className="absolute w-full top-12 bg-white border shadow-xl rounded-b max-h-60 overflow-auto z-10">
                                    {searchResults.map(m=>{ 
                                        const stock = sumArrayQty(m.received) - sumArrayQty(m.disbursed); 
                                        return (
                                            <div key={m.code} className="p-3 hover:bg-orange-50 border-b cursor-pointer flex justify-between items-center transition-colors" onClick={()=>addManualItem(m)}>

                                                    <div className="text-xs mt-0.5">

                                    {searchResults.length === 0 && <div className="p-4 text-center text-slate-400">No active items found.</div>}
                                </div>
                            )}
                        </div>
                        
                        {manualForm.items.length > 0 && (
                            <div className="mt-4 border rounded-lg overflow-hidden">
                                <table className="w-full text-sm">
                                    <thead className="bg-slate-50 border-b"><tr><th className="text-left p-3">Item</th><th className="w-24 text-center p-3">Qty</th></tr></thead>
                                    <tbody className="divide-y">
                                        {manualForm.items.map((it,i)=>(
                                            <tr key={i} className="hover:bg-slate-50">
                                                <td className="p-3 font-medium">{it.name} <span className="text-slate-400 text-xs ml-1">({it.spec})</span></td>
                                                <td className="p-2"><input type="number" className="w-full border text-center rounded p-1.5 focus:ring-2 focus:ring-blue-500 outline-none" value={it.qty} onChange={e=>updateManualQty(i,e.target.value)}/></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                        
                        <button onClick={saveManualRequest} className="bg-slate-800 text-white px-4 py-3 rounded-lg mt-6 w-full font-bold shadow-md hover:bg-slate-900 transition-colors flex justify-center items-center gap-2"><Icons.Save size={18}/> Save Manual Request</button>
                    </div>
                </div>
            );
        };

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 bg-red-50 min-h-screen font-sans text-center flex flex-col items-center justify-center">
                            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg border-t-4 border-red-600">
                                <h1 className="text-2xl font-bold text-red-600 mb-4">🚨 ระบบเกิดข้อผิดพลาดร้ายแรง</h1>
                                <p className="text-slate-600 mb-6">หน้าจอไม่สามารถแสดงผลได้ แต่ข้อมูลของคุณยังปลอดภัยอยู่ในเครื่อง!</p>
                                <button 
                                    onClick={() => {
                                        let best='', max=0;
                                        for(let i=0; i<localStorage.length; i++){
                                            let v = localStorage.getItem(localStorage.key(i));
                                            if(v && v.includes('masterData') && v.length>max){ max=v.length; best=v; }
                                        }
                                        if(best){
                                            const a=document.createElement('a');
                                            a.href=URL.createObjectURL(new Blob([best], {type:'application/json'}));
                                            a.download='Emergency_Backup.json';
                                            a.click();
                                        } else alert('ไม่พบข้อมูลสำรองใน LocalStorage ระบบอาจใช้ IndexedDB แนะนำให้ใช้เครื่องมือ Recovery');
                                    }}
                                    className="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg mb-4 w-full transition-colors"
                                >
                                    ⬇️ ดาวน์โหลดข้อมูลสำรองฉุกเฉิน
                                </button>
                                <button 
                                    onClick={() => { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(`${STORAGE_KEY}__last_good`); localStorage.removeItem(`${STORAGE_KEY}__saved_at`); localStorage.removeItem(`${STORAGE_KEY}__last_error`); window.location.reload(); }}
                                    className="text-slate-400 hover:text-slate-600 underline text-sm"
                                >
                                    ล้างข้อมูลและรีเฟรชหน้าจอ (Reset)
                                </button>
                                <div className="mt-4 text-xs text-slate-500 text-left w-full">
                                    <div>บันทึกล่าสุด: {localStorage.getItem(`${STORAGE_KEY}__saved_at`) || '-'}</div>
                                    <div>Last Error Log: {(() => { try { const x = JSON.parse(localStorage.getItem(`${STORAGE_KEY}__last_error`) || 'null'); return x?.message || '-'; } catch(e) { return '-'; } })()}</div>
                                </div>
                                <div className="mt-6 p-4 bg-slate-100 rounded text-left text-xs font-mono text-red-800 overflow-auto max-h-40">
                                    {this.state.error && this.state.error.toString()}
                                </div>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const App = () => {
            const [activeView, setActiveView] = useState('SUMMARY');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [systemSetupOpen, setSystemSetupOpen] = useState(true);
            const [isLoaded, setIsLoaded] = useState(false);
            
            const [reqConfig, setReqConfig] = useState({ prefix: 'REQ-24-', nextRun: 1 });
            const [masterData, setMasterData] = useState([]);
            const [categoryList, setCategoryList] = useState([{id: 'CAT-1', name: 'General', abbr: 'GN'}]);
            const [unitList, setUnitList] = useState([{id: 'UNIT-1', name: 'Pcs'}]);
            const [personnel, setPersonnel] = useState([]);
            const [requests, setRequests] = useState([]);
            const [receipts, setReceipts] = useState([]);
            const [plans, setPlans] = useState([]);
            const [vendors, setVendors] = useState([]);
            const [companies, setCompanies] = useState([]);
            
            const [summaryCat, setSummaryCat] = useState('ALL');

            const [isReceiving, setIsReceiving] = useState(false);
            const [editingReceipt, setEditingReceipt] = useState(null);
            const [isCreatingReq, setIsCreatingReq] = useState(false);
            const [editingRequest, setEditingRequest] = useState(null);
            const [viewingRequestIdx, setViewingRequestIdx] = useState(null);
            const [isPlanning, setIsPlanning] = useState(false);
            const [editingPlan, setEditingPlan] = useState(null);

            const [alertMsg, setAlertMsg] = useState(null);
            const [confirmMsg, setConfirmMsg] = useState(null);

            const showAlert = (message, title = "แจ้งเตือน") => setAlertMsg({ title, message });
            const showConfirm = (message, onConfirm, title = "ยืนยันการทำรายการ") => setConfirmMsg({ title, message, onConfirm });

            const [showRecoveryModal, setShowRecoveryModal] = useState(false);
            const [recoveryOptions, setRecoveryOptions] = useState([]);
            const [centralFileHandle, setCentralFileHandle] = useState(null);
            const [centralFileName, setCentralFileName] = useState('');
            const [centralFileStatus, setCentralFileStatus] = useState('');
            const centralFileInputRef = useRef(null);

            useEffect(() => {
                loadXLSX();
                
                const loadData = async () => {
                    let parsed = await loadFromDB(STORAGE_KEY);
                    
                    if (!parsed) {
                        const rawOld = localStorage.getItem(STORAGE_KEY);
                        if (rawOld) {
                            try { parsed = JSON.parse(rawOld); } catch(e){}
                        }
                    }
                    if (!parsed) {
                        const rawLastGood = localStorage.getItem(`${STORAGE_KEY}__last_good`);
                        if (rawLastGood) {
                            try { parsed = JSON.parse(rawLastGood); } catch(e){}
                        }
                    }

                    if (parsed) {
                        let normalized = normalizeAppData(parsed);
                        if (normalized.masterData.length === 0 && window.MATERIAL_CONTROL_MASTER_SEED?.masterData?.length) {
                            normalized = normalizeAppData(window.MATERIAL_CONTROL_MASTER_SEED);
                        }
                        let loadedMasterData = normalized.masterData || [];
                        let loadedCats = normalized.categoryList || [];
                        let loadedUnits = normalized.unitList || [];
                        let loadedPersonnel = normalized.personnel || [];
                        let loadedRequests = normalized.requests || [];
                        let loadedReceipts = normalized.receipts || [];
                        let loadedPlans = normalized.plans || [];
                        let loadedVendors = normalized.vendors || [];
                        let loadedCompanies = normalized.companies || [{ id: Date.now(), name: 'บริษัทหลัก (Main Contractor)' }];

                        if(normalized.reqConfig) setReqConfig(normalized.reqConfig);

                        loadedMasterData.forEach(m => {
                            if (m.ordered && Array.isArray(m.ordered)) {
                                m.ordered.forEach(o => {
                                    if (o.qty && Number(o.qty) > 0 && (!o.planId || !loadedPlans.find(p => p.id === o.planId))) {
                                        let plan = loadedPlans.find(p => p.prNo === (o.prNo || 'N/A') && p.date === (o.date || ''));
                                        if (!plan) {
                                            plan = { id: `PLAN-MIG-${Date.now()}-${Math.random().toString(36).substr(2,5)}`, prNo: o.prNo || 'N/A', date: o.date || '', items: [] };
                                            loadedPlans.push(plan);
                                        }
                                        if (!plan.items.find(i => i.code === m.code)) {
                                            plan.items.push({ code: m.code, name: m.name, spec: m.spec, brand: m.brand, unit: m.unit, qty: o.qty });
                                        }
                                        o.planId = plan.id;
                                    }
                                });
                            }
                            
                            if (m.received && Array.isArray(m.received)) {
                                m.received.forEach(r => {
                                    if (r.qty && Number(r.qty) > 0 && (!r.receiptId || !loadedReceipts.find(p => p.id === r.receiptId))) {
                                        let rec = loadedReceipts.find(p => p.do === (r.deliveryNo || '') && p.date === (r.date || ''));
                                        if (!rec) {
                                            rec = { id: `REC-MIG-${Date.now()}-${Math.random().toString(36).substr(2,5)}`, vendor: r.vendor || 'Unknown', do: r.deliveryNo || '', pr: r.prNo || '', date: r.date || '', items: [] };
                                            loadedReceipts.push(rec);
                                        }
                                        if (!rec.items.find(i => i.code === m.code)) {
                                            rec.items.push({ code: m.code, name: m.name, spec: m.spec, brand: m.brand, unit: m.unit, qty: r.qty });
                                        }
                                        r.receiptId = rec.id;
                                    }
                                });
                            }
                            
                            if (m.disbursed && Array.isArray(m.disbursed)) {
                                m.disbursed.forEach(d => {
                                    if (d.qty && Number(d.qty) > 0 && (!d.reqNo || !loadedRequests.find(req => req.id === d.reqNo || req.sheetNo === d.reqNo))) {
                                        let reqName = d.reqNo || `REQ-MIG-${d.date || 'Old'}`;
                                        let req = loadedRequests.find(p => p.id === reqName);
                                        if (!req) {
                                            req = { id: reqName, sheetNo: reqName, from: d.company || 'Unknown', company: d.company || '', date: d.date || '', work: '', status: 'Approved', items: [] };
                                            loadedRequests.push(req);
                                        }
                                        if (!req.items.find(i => i.code === m.code)) {
                                            req.items.push({ code: m.code, name: m.name, spec: m.spec, brand: m.brand, unit: m.unit, qty: d.qty });
                                        }
                                        d.reqNo = req.id;
                                    }
                                });
                            }
                        });

                        setMasterData(loadedMasterData);
                        setCategoryList(loadedCats);
                        setUnitList(loadedUnits);
                        setPersonnel(loadedPersonnel);
                        setRequests(loadedRequests);
                        setReceipts(loadedReceipts);
                        setPlans(loadedPlans);
                        setVendors(loadedVendors);
                        setCompanies(loadedCompanies);
                        persistLocalBackup({ masterData: loadedMasterData, categoryList: loadedCats, unitList: loadedUnits, personnel: loadedPersonnel, requests: loadedRequests, receipts: loadedReceipts, plans: loadedPlans, reqConfig: normalized.reqConfig, vendors: loadedVendors, companies: loadedCompanies });
                    } else {
                        const fallbackData = normalizeAppData(window.MATERIAL_CONTROL_MASTER_SEED || {});
                        setReqConfig(fallbackData.reqConfig);
                        setMasterData(fallbackData.masterData);
                        setCategoryList(fallbackData.categoryList);
                        setUnitList(fallbackData.unitList);
                        setPersonnel(fallbackData.personnel);
                        setRequests(fallbackData.requests);
                        setReceipts(fallbackData.receipts);
                        setPlans(fallbackData.plans);
                        setVendors(fallbackData.vendors);
                        setCompanies(fallbackData.companies);
                        persistLocalBackup(fallbackData);
                    }

                    setTimeout(() => { setIsLoaded(true); }, 500);
                };
                
                loadData();
            }, []);

            useEffect(() => {
                if (isLoaded) {
                    const dataObj = normalizeAppData({ masterData, categoryList, unitList, personnel, requests, receipts, plans, reqConfig, vendors, companies });
                    saveToDB(STORAGE_KEY, dataObj);
                    persistLocalBackup(dataObj);
                }
            }, [masterData, categoryList, unitList, personnel, requests, receipts, plans, reqConfig, vendors, companies, isLoaded]);

            const getCurrentData = () => normalizeAppData({ masterData, categoryList, unitList, personnel, requests, receipts, plans, reqConfig, vendors, companies });

            const applyDataToState = async (rawData) => {
                const normalized = normalizeAppData(rawData);
                setReqConfig(normalized.reqConfig);
                setMasterData(normalized.masterData);
                setCategoryList(normalized.categoryList);
                setUnitList(normalized.unitList);
                setPersonnel(normalized.personnel);
                setRequests(normalized.requests);
                setReceipts(normalized.receipts);
                setPlans(normalized.plans);
                setVendors(normalized.vendors);
                setCompanies(normalized.companies);
                await saveToDB(STORAGE_KEY, normalized);
                persistLocalBackup(normalized);
                return normalized;
            };

            const loadCentralDataFile = async (file, handle = null) => {
                try {
                    const parsed = JSON.parse(await file.text());
                    if (!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.masterData)) {
                        return showAlert("ไฟล์ข้อมูลกลางไม่ถูกต้อง กรุณาเลือกไฟล์ MaterialControlData.json หรือไฟล์ Backup ของระบบ", "โหลดไฟล์ไม่สำเร็จ");
                    }
                    const normalized = await applyDataToState(parsed);
                    setCentralFileHandle(handle);
                    setCentralFileName(file.name || CENTRAL_DATA_FILE_NAME);
                    setCentralFileStatus(`เปิดไฟล์กลางแล้ว: ${file.name || CENTRAL_DATA_FILE_NAME}`);
                    showAlert(`โหลดไฟล์ข้อมูลกลางสำเร็จ\nพบพัสดุ ${normalized.masterData.length} รายการ`, "สำเร็จ");
                } catch (err) {
                    console.error('Central data load error:', err);
                    showAlert("อ่านไฟล์ข้อมูลกลางไม่สำเร็จ กรุณาตรวจสอบว่าเป็นไฟล์ JSON ของระบบ", "เกิดข้อผิดพลาด");
                } finally {
                    if (centralFileInputRef.current) centralFileInputRef.current.value = '';
                }
            };

            const handleOpenCentralData = async () => {
                if (window.showOpenFilePicker) {
                    try {
                        const [handle] = await window.showOpenFilePicker({
                            types: [{ description: 'Material Control Data', accept: { 'application/json': ['.json'] } }],
                            multiple: false
                        });
                        const file = await handle.getFile();
                        await loadCentralDataFile(file, handle);
                        return;
                    } catch (err) {
                        if (err?.name === 'AbortError') return;
                        console.error('File picker open error:', err);
                    }
                }
                centralFileInputRef.current?.click();
            };

            const downloadCentralDataFile = (dataObj, filename = CENTRAL_DATA_FILE_NAME) => {
                const dataStr = JSON.stringify(dataObj, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json;charset=utf-8' });
                const linkElement = document.createElement('a');
                linkElement.href = URL.createObjectURL(blob);
                linkElement.download = filename || CENTRAL_DATA_FILE_NAME;
                linkElement.click();
                setTimeout(() => URL.revokeObjectURL(linkElement.href), 1000);
            };

            const writeCentralDataHandle = async (handle, dataObj) => {
                if (handle.queryPermission && handle.requestPermission) {
                    const currentPermission = await handle.queryPermission({ mode: 'readwrite' });
                    if (currentPermission !== 'granted') {
                        const nextPermission = await handle.requestPermission({ mode: 'readwrite' });
                        if (nextPermission !== 'granted') throw new Error('ไม่ได้รับสิทธิ์เขียนไฟล์');
                    }
                }
                const writable = await handle.createWritable();
                await writable.write(JSON.stringify(dataObj, null, 2));
                await writable.close();
            };

            useEffect(() => {
                if (!isLoaded || !centralFileHandle?.createWritable) return;
                let cancelled = false;
                const timer = setTimeout(async () => {
                    try {
                        const dataObj = getCurrentData();
                        await writeCentralDataHandle(centralFileHandle, dataObj);
                        if (!cancelled) {
                            const stamp = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                            setCentralFileStatus(`บันทึกอัตโนมัติแล้ว ${stamp}: ${centralFileName || CENTRAL_DATA_FILE_NAME}`);
                        }
                    } catch (err) {
                        if (!cancelled) {
                            console.error('Central data auto-save error:', err);
                            setCentralFileStatus("บันทึกอัตโนมัติไม่สำเร็จ กรุณากดบันทึกไฟล์กลาง");
                        }
                    }
                }, 2000);
                return () => {
                    cancelled = true;
                    clearTimeout(timer);
                };
            }, [masterData, categoryList, unitList, personnel, requests, receipts, plans, reqConfig, vendors, companies, isLoaded, centralFileHandle, centralFileName]);

            const handleSaveCentralData = async () => {
                const dataObj = getCurrentData();
                try {
                    if (centralFileHandle?.createWritable) {
                        await writeCentralDataHandle(centralFileHandle, dataObj);
                        setCentralFileStatus(`บันทึกไฟล์กลางแล้ว: ${centralFileName || CENTRAL_DATA_FILE_NAME}`);
                        showAlert("บันทึกกลับไฟล์ข้อมูลกลางสำเร็จ รอ OneDrive sync ให้เสร็จก่อนเปิดจากเครื่องอื่น", "สำเร็จ");
                        return;
                    }
                    if (window.showSaveFilePicker) {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: centralFileName || CENTRAL_DATA_FILE_NAME,
                            types: [{ description: 'Material Control Data', accept: { 'application/json': ['.json'] } }]
                        });
                        await writeCentralDataHandle(handle, dataObj);
                        setCentralFileHandle(handle);
                        setCentralFileName(handle.name || centralFileName || CENTRAL_DATA_FILE_NAME);
                        setCentralFileStatus(`บันทึกไฟล์กลางแล้ว: ${handle.name || centralFileName || CENTRAL_DATA_FILE_NAME}`);
                        showAlert("บันทึกไฟล์ข้อมูลกลางสำเร็จ เก็บไฟล์นี้ไว้ใน OneDrive เพื่อเปิดจากเครื่องอื่น", "สำเร็จ");
                        return;
                    }
                    downloadCentralDataFile(dataObj, centralFileName || CENTRAL_DATA_FILE_NAME);
                    setCentralFileStatus("ดาวน์โหลดไฟล์ข้อมูลกลางแล้ว กรุณานำไฟล์ไปวางทับใน OneDrive");
                    showAlert("Browser นี้ไม่รองรับการเขียนทับไฟล์โดยตรง ระบบจึงดาวน์โหลดไฟล์ JSON ให้ กรุณานำไปวางทับไฟล์กลางใน OneDrive", "บันทึกแบบดาวน์โหลด");
                } catch (err) {
                    if (err?.name === 'AbortError') return;
                    console.error('Central data save error:', err);
                    showAlert("บันทึกไฟล์ข้อมูลกลางไม่สำเร็จ กรุณาลอง Save As ใหม่", "เกิดข้อผิดพลาด");
                }
            };

            const handleSaveCentralDataAs = async () => {
                const dataObj = getCurrentData();
                try {
                    if (window.showSaveFilePicker) {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: CENTRAL_DATA_FILE_NAME,
                            types: [{ description: 'Material Control Data', accept: { 'application/json': ['.json'] } }]
                        });
                        await writeCentralDataHandle(handle, dataObj);
                        setCentralFileHandle(handle);
                        setCentralFileName(handle.name || CENTRAL_DATA_FILE_NAME);
                        setCentralFileStatus(`บันทึกไฟล์กลางแล้ว: ${handle.name || CENTRAL_DATA_FILE_NAME}`);
                        showAlert("บันทึกไฟล์ข้อมูลกลางสำเร็จ เก็บไฟล์นี้ไว้ใน OneDrive เพื่อเปิดจากเครื่องอื่น", "สำเร็จ");
                        return;
                    }
                    downloadCentralDataFile(dataObj, CENTRAL_DATA_FILE_NAME);
                    setCentralFileStatus("ดาวน์โหลดไฟล์ข้อมูลกลางแล้ว กรุณานำไฟล์ไปวางทับใน OneDrive");
                    showAlert("Browser นี้ไม่รองรับ Save As โดยตรง ระบบจึงดาวน์โหลดไฟล์ JSON ให้", "บันทึกแบบดาวน์โหลด");
                } catch (err) {
                    if (err?.name === 'AbortError') return;
                    console.error('Central data save as error:', err);
                    showAlert("บันทึกไฟล์ข้อมูลกลางไม่สำเร็จ", "เกิดข้อผิดพลาด");
                }
            };


            useEffect(() => {
                const handleRuntimeError = (event) => {
                    try {
                        localStorage.setItem(`${STORAGE_KEY}__last_error`, JSON.stringify({
                            message: event?.message || event?.reason?.message || 'Unknown runtime error',
                            stack: event?.error?.stack || event?.reason?.stack || '',
                            at: new Date().toISOString()
                        }));
                    } catch (e) {}
                };
                window.addEventListener('error', handleRuntimeError);
                window.addEventListener('unhandledrejection', handleRuntimeError);
                return () => {
                    window.removeEventListener('error', handleRuntimeError);
                    window.removeEventListener('unhandledrejection', handleRuntimeError);
                };
            }, []);

            const handleExportBackup = () => {
                const dataStr = JSON.stringify(normalizeAppData({ masterData, categoryList, unitList, personnel, requests, receipts, plans, reqConfig, vendors, companies }));
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `MaterialControl_Backup_${new Date().toISOString().split('T')[0]}.json`;
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const handleImportBackup = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const parsed = JSON.parse(evt.target.result);
                        if (parsed && parsed.masterData) {
                            const normalized = normalizeAppData(parsed);
                            await saveToDB(STORAGE_KEY, normalized);
                            persistLocalBackup(normalized);
                            showAlert("กู้คืนข้อมูลจากไฟล์ Backup สำเร็จ! ระบบจะทำการรีโหลดหน้าจอใหม่", "กู้คืนสำเร็จ");
                            setTimeout(() => { window.location.reload(); }, 1500);
                        } else {
                            showAlert("ไฟล์ข้อมูลไม่ถูกต้อง (รูปแบบไม่ตรงกับระบบ)", "เกิดข้อผิดพลาด");
                        }
                    } catch(err) {
                        showAlert("เกิดข้อผิดพลาดในการอ่านไฟล์ JSON", "เกิดข้อผิดพลาด");
                    }
                };
                reader.readAsText(file);
            };

            const triggerManualRestore = async () => {
                let backups = [];
                try {
                    const data = await loadFromDB(STORAGE_KEY);

                    />}
                    {isPlanning && <PlanningModal 
                        isPlanning={isPlanning} setIsPlanning={setIsPlanning} 
                        editingPlan={editingPlan} setEditingPlan={setEditingPlan}
                        masterData={masterData} setMasterData={setMasterData} 
                        plans={plans} setPlans={setPlans} 
                        showAlert={showAlert} 
                    />}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    
    </script>
</body>
</html>
